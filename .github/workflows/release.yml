name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: python -m pip install --upgrade pip pyyaml jsonschema pytest
      - name: Rebuild runtime from catalog
        run: catalog/scripts/initialize-harness --apply --project-root . --catalog ./catalog
      - name: Run tests
        run: python -m pytest catalog/scripts/tests/ scripts/tests/ -v
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install release tooling
        run: npm ci
      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
