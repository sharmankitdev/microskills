name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          # Admin-owned fine-grained PAT so semantic-release's version-bump push is
          # attributed to an admin (the only bypass actor on the main ruleset).
          # Without it the push runs as github-actions[bot] and is rejected by the
          # "require pull request" rule. Falls back to GITHUB_TOKEN if unset (push
          # will then fail the ruleset — set the RELEASE_TOKEN secret).
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: python -m pip install --upgrade pip pyyaml jsonschema pytest
      - name: Rebuild runtime from catalog
        run: catalog/scripts/initialize-harness --apply --project-root . --catalog ./catalog
      - name: Run tests
        run: python -m pytest catalog/scripts/tests/ scripts/tests/ -v
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install release tooling
        run: npm ci
      - name: Release
        run: npx semantic-release
        env:
          # Same admin PAT for @semantic-release/github (tag + release creation) and
          # the @semantic-release/git back-push; falls back to the default token.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
