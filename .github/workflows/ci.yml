name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml jsonschema pytest
      # Node is required by the run-step eval kernel (checkpoint expressions run
      # as the compiler's own JS) and by the golden-run harness (run-segment-host
      # executes compiled segments under a mocked engine). Tests that need node
      # skip cleanly when it is absent — pin it here so they actually run in CI.
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Rebuild runtime from catalog
        run: catalog/scripts/initialize-harness --apply --project-root . --catalog ./catalog
      # Compile-closure drift gate: recompile every catalog def IN MEMORY (--check
      # writes nothing) and compare against its committed closure.lock.json — the
      # baseline (a fresh checkout has no .compiled/; the lockfile IS the baseline).
      # A registry/def edit that changes the executed semantics without re-locking
      # (compile-workflow <name> --lock) fails here with a per-node drift report.
      - name: Closure drift gate (catalog lockfiles)
        run: |
          for d in catalog/workflow-defs/*/; do
            # Skip non-def dirs (e.g. _snippets/, the engine-owned shared-prompt
            # includes) — only a dir with a WORKFLOW.yaml is a compilable def.
            [ -f "$d/WORKFLOW.yaml" ] || continue
            catalog/scripts/compile-workflow "$(basename "$d")" --defs-root catalog/workflow-defs --check
          done
      # Full-registry static validation: every catalog def must pass
      # validate-workflow WITH --defs-root (imports allowlist, nested-target
      # resolution, depth=1 + import-cycle, required-child-input, fork lints) —
      # the --check gate above only pins the locked compile closure; this gate
      # runs the registry-aware checks alongside it (exit 1 on any block).
      - name: Validate catalog defs (full-registry)
        run: |
          for d in catalog/workflow-defs/*/; do
            [ -f "$d/WORKFLOW.yaml" ] || continue
            catalog/scripts/validate-workflow "$d/WORKFLOW.yaml" "$d/profiles/base.yaml" --defs-root catalog/workflow-defs
          done
      - name: Run tests
        run: python -m pytest catalog/scripts/tests/ scripts/tests/ hooks/tests/ -v
