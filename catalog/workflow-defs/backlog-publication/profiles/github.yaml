version: 1

# Interactive, GitHub publish target. ONE keyed patch: retarget the publish node to
# the publish-backlog microskill's `github` profile (one milestone per epic, one issue
# per story via gh, in the github_repo workflow input or the current repository).
# Nothing else changes — rigor and gate policy are profile-invariant.
nodes:
  patch:
    - id: publish
      customize: { profile: github }
