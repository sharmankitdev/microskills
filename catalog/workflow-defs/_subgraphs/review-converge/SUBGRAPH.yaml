version: 1
# review-converge — the FIRST BOUNDED catalog subgraph, and the minimal demonstrator of
# the `subgraph:` primitive's bounded convergence (a SELF-CONTAINED local do/while around
# the spliced group). A host node `subgraph: review-converge` is DESUGARED by
# compile-workflow / validate-workflow BEFORE partitioning: its two plain agent: nodes land
# in the host's BACKGROUND segment, wrapped in a `do { review; synthesize } while
# ((!converged) && iter < max_iters)` — in-segment, autonomous, no checkpoint break, the cap
# always honoured.
#
# It is intentionally minimal: two self-contained agent: nodes (no microskill dependency →
# splices anywhere with no missing components), parameterized by {{artifact_kind}} and bound
# to a host ${inputs.artifact_path}. The exit (synthesize) emits a `converged` verdict the
# convergence signal reads; the bounded grammar pins the signal to reference ONLY that exit.
# The flagship review→collect→verify→synthesize content is a LATER step; this proves the
# bounded splice end-to-end over the real registry (the CI closure-drift + full-registry
# validate gates compile/validate the bounded smoke def every run).
#
# This file is plugin/ENGINE-owned: initialize-harness vendors it to
# .claude/workflow-defs/_subgraphs/review-converge/SUBGRAPH.yaml; it is never a component,
# never appears in harness.yaml, and harness-sync never touches it.

# Textual {{param}} tokens, substituted from the host node's `with:` map.
params:
  artifact_kind:
    required: true

# ${inputs.<name>} binding points; the host node's `inputs:` supplies a ${ref} each.
inputs:
  artifact_path:
    required: true

# The exit: downstream host refs ${<splice-id>.output...} re-point at <splice-id>__synthesize.
output: synthesize

# bounded = a local do/while around the spliced group, emitted INSIDE the host segment. The
# signal references ONLY the exit (synthesize) — `until: ${synthesize.output.converged}`
# desugars to `while: ${!(synthesize.output.converged)}`, so the group re-runs until the exit
# reports converged OR the max_iters cap is hit.
convergence:
  mode: bounded
  max_iters: 3
  until: ${synthesize.output.converged}

nodes:
  # Review the bound artifact along the host-supplied kind. {{artifact_kind}} is substituted
  # textually from the host `with:`; ${inputs.artifact_path} is rewritten to the host
  # `inputs:` binding on splice.
  - id: review
    agent: reviewer
    prompt: >-
      Review this {{artifact_kind}}, read at ${inputs.artifact_path}, and report concrete
      findings as structured notes, each with a severity and a suggested fix.
    inputs:
      artifact_path: ${inputs.artifact_path}
    output_schema:
      type: object
      required: [findings]
      properties:
        findings: { type: array }

  # Synthesize the review into one prioritized report and judge whether the artifact has
  # converged (no blocking findings remain). The sibling ${review.output} ref is re-pointed at
  # <splice-id>__review on splice; this node is the `output:` exit, so the convergence signal
  # (${synthesize.output.converged}) and downstream host refs both resolve here.
  - id: synthesize
    agent: synthesizer
    depends_on: [review]
    prompt: >-
      Synthesize the review findings ${review.output} into a single prioritized report, then
      decide whether the artifact has CONVERGED (no blocking findings remain). Return the
      report and a boolean `converged`.
    inputs:
      findings: ${review.output}
    # `converged` drives the bounded loop's continue-condition; `report` is the exit field
    # downstream host nodes read as ${<splice-id>.output.report}. A required field also makes
    # native args-truncation detection fire for this consumed node.
    output_schema:
      type: object
      required: [converged, report]
      properties:
        converged: { type: boolean }
        report: { type: string }
