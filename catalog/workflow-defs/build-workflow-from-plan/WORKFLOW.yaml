version: 1
name: build-workflow-from-plan
base: true
description: >
  Build a workflow from an already-approved plan — the implement ↔ evaluate loop plus the
  canonical finalize (vendor into harness/, upsert the manifest, sync, compile). The shared
  build half of workflow-create: callers (workflow-create, decompose-monolith-orchestrator)
  run their own plan + approval gate + provision, then invoke this with the approved plan.
  Has no plan node, no approval gate, and no provision — it starts from plan_path, so there
  is exactly one finalize and the two creators cannot drift.

# Caller-supplied inputs. plan_path/name/requirement are produced by the caller's own plan;
# the harness_* plumbing mirrors workflow-create's finalize so the vendoring is identical.
inputs:
  plan_path:
    type: string
    required: true
    description: Path to the approved WORKFLOW.yaml-design plan file under staging_dir.
  name:
    type: string
    required: true
    description: Target workflow name (kebab-case) the implementer staged under <staging_dir>/<name>/.
  requirement_path:
    type: string
    required: true
    materialize: file
    description: >-
      The originating requirement — the evaluator's semantic ground truth.
      task-evaluate Reads the path.
  harness_root:
    type: string
    required: false
    default: harness
    description: Committed harness source-of-truth root. Finalize vendors the workflow to <harness_root>/workflow-defs/<name>/; sync-harness then generates the .claude/ runtime copy + shim, and finalize compiles it.
  harness_yaml:
    type: string
    required: false
    default: harness/harness.yaml
    description: Harness manifest. Finalize upserts the component's entry here (source custom) before syncing.
  staging_dir:
    type: string
    required: true
    description: Sandbox dir; the implementer writes <staging_dir>/<name>/ before finalize moves it.

imports:
  - microskills/task-implement
  - microskills/task-evaluate

# Parameters for the SHARED finalize protocol (_snippets/finalize-protocol.md,
# included below via {{snippet:finalize-protocol}} — snippets resolve before vars,
# so these {{...}} tokens parameterize the shared prose). microskill-create carries
# the microskill-domain twin of this block; the protocol text itself lives in ONE
# place so the two finalizes cannot drift.
vars:
  finalize_kind: workflow
  finalize_plan_ref: ${workflow.inputs.plan_path}
  finalize_name_source: <name> = ${workflow.inputs.name}
  finalize_dest_subdir: workflow-defs
  finalize_staged_layout: WORKFLOW.yaml + profiles/* + references/* — do NOT include any .compiled/ dir
  finalize_epilogue: >-
    proceed. FINALLY, now that sync has vendored the source into
    .claude/workflow-defs/<name>/, run `.claude/scripts/compile-workflow <name>` to
    populate its .compiled/ run manifest (sync does not compile). Print a summary:
    the harness/ source path, the synced .claude/ paths + generated shim, and that
    .compiled/ was regenerated. Do not claim success on an unresolved sync conflict
    or a failed compile.

# No plan node and no approval gate (those live in the caller).
nodes:
  # The implement ↔ evaluate loop assembling and validating the WORKFLOW.yaml
  # from the approved plan.
  - id: implement
    use: task-implement
    customize: { profile: workflow }
    inputs:
      plan_path: ${workflow.inputs.plan_path}
      staging_dir: ${workflow.inputs.staging_dir}
      last_findings: ${loop.carry.last_findings}

  - id: evaluate
    use: task-evaluate
    customize: { profile: workflow }
    inputs:
      staging_paths: ${implement.output.staging_paths}
      requirement_path: ${workflow.inputs.requirement_path}
      plan_path: ${workflow.inputs.plan_path}
      name: ${workflow.inputs.name}
      staging_base: ${workflow.inputs.staging_dir}

  # THE canonical workflow finalize. Vendor the approved workflow into harness/
  # (source of truth), upsert the manifest, let sync-harness generate the
  # .claude/ runtime copy + shim + ledger, THEN compile-workflow to populate
  # .compiled/ (sync does not compile). Shared by every creator so the vendoring
  # can never diverge. The prompt is the SHARED finalize protocol (one snippet,
  # parameterized by the vars: block above) — edit _snippets/finalize-protocol.md,
  # not a per-def copy; its ${implement.output...}/${evaluate.output...} refs
  # imply the dependency edges.
  - id: finalize
    delegation: orchestrator
    prompt: "{{snippet:finalize-protocol}}"

# Guarded loop: repeat implement→evaluate until the evaluator passes or the cap.
loop:
  while: ${!evaluate.output.pass}
  max_iters: 3
  body: [implement, evaluate]
  carry:
    last_findings: ${evaluate.output}
  on_exhaust:
    # Cap exhaustion is a verdict, not a budget overrun: delegate it to the
    # orchestrator instead of letting a still-failing draft flow into finalize.
    # extend re-runs the loop with the committed carry (guidance appended to the
    # materialized requirement file); accept proceeds on an explicit human
    # choice; headless runs PARK resumable here (on_headless: fail — the
    # do-the-work-overnight, approve-in-the-morning pattern).
    action: escalate
    prompt: The implement-evaluate loop hit its round cap with the evaluator still failing - extend with another round budget (optionally with guidance), accept the draft as-is, or abandon?
    options: [extend, accept, abandon]
    notes_input: requirement_path
    on_headless: fail

output:
  from: finalize
