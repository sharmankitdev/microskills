version: 1

# Autonomous overlay — unattended / nested runs. Rigor is PROFILE-INVARIANT
# (MULTIAGENTIC-DESIGN §1 / arch-rigor §0): every panel, refute fan-out, the HLD
# convergence loop, and the triage_lld advisory park run identically in both
# profiles. This overlay changes exactly two things, both sanctioned:
#
#   1. gate_mode: auto — the three declared `default: approve` T7 picks are taken
#      verbatim and recorded; loop_exhaust keeps on_headless: fail (an unconverged
#      HLD PARKS honestly — pickup rail; `default: accept` is banned), and a red
#      post-fix LLD verdict still stops the run naming triage_lld (the dispatcher
#      never answers AskUserQuestion on the user's behalf).
#   2. the finalize_design gates_mode input literal flips human → auto-default —
#      the W1 mode-record convention for the ledger's gates_taken entries, a
#      record label, NOT a rigor delta.
#
# No prompt patches, no node/gate adds or removes, no loop softening.
gate_mode: auto
nodes:
  patch:
    - id: finalize_design
      inputs:
        gates_mode: auto-default
