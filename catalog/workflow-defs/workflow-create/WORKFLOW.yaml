version: 1
name: workflow-create
base: true
description: Declarative pipeline that turns a requirement into a validated WORKFLOW.yaml — plan (agent) → approval gate → provision missing microskills → implement/evaluate loop → finalize.

# Top-level workflow inputs (referenced as ${workflow.inputs.<name>}).
inputs:
  requirement_path:
    type: string
    required: true
    materialize: file
    description: >-
      Natural-language description of the workflow to create. task-plan / task-evaluate
      Read the path; the nested build-workflow-from-plan receives the same path.
  name:
    type: string
    required: false
    description: Optional name override for the planner's proposal.
  harness_root:
    type: string
    required: false
    default: harness
    description: Committed harness source-of-truth root. Finalize vendors the new workflow to <harness_root>/workflow-defs/<name>/; sync-harness then generates the .claude/ runtime copy + shim, and finalize compiles it.
  harness_yaml:
    type: string
    required: false
    default: harness/harness.yaml
    description: Harness manifest. Finalize upserts the component's entry here (source custom) before syncing.
  staging_dir:
    type: string
    required: false
    default: .claude/.workflow-staging/wf-create
    description: Sandbox dir; the implementer writes <staging_dir>/<name>/ before finalize moves it.

imports:
  - microskills/task-plan
  - build-workflow-from-plan
  - microskill-create

# Node definition order is load-bearing: orchestrator nodes (provision, advise)
# come BEFORE the loop body so they don't split the implement/evaluate segment.
nodes:
  # Seg 1 (background): plan the workflow. The planner enumerates reusable
  # microskills/agents/workflows, designs the node graph + profile reuse, and
  # lists any microskills that must be created first. Human approves at the gate.
  - id: plan
    use: task-plan
    customize: { profile: workflow }
    inputs:
      requirement_path: ${workflow.inputs.requirement_path}
      name_override: ${workflow.inputs.name}
      staging_dir: ${workflow.inputs.staging_dir}
    output_schema:
      type: object
      required: [plan_path, name, scope_advisory, missing_microskills]
      properties:
        plan_path: { type: ["string", "null"], description: Path to the written WORKFLOW.yaml-design plan file under staging_dir, or null when a scope advisory applies. }
        name: { type: ["string", "null"] }
        scope_advisory: { type: ["object", "null"], description: "{kind: split|promote|adapt, reason, recommendation} or null." }
        missing_microskills:
          type: array
          description: Microskills the workflow needs that do not yet exist; each is created via microskill-create before implement.
          items:
            type: object
            properties:
              name: { type: string }
              requirement: { type: string }

  # Checkpoint (nested workflow): create the microskills the planner flagged as
  # missing, one per item, by invoking microskill-create with the autonomous
  # (gates-warn) profile — passed structurally via customize.profile, so no human
  # pause. First-class workflow: node (mirrors `build` below): runs in the main loop
  # — the only place a node may invoke a nested workflow. for_each fans out one child
  # run per missing microskill; each vendors into harness/microskills/<name>/, upserts
  # harness.yaml, and runs sync-harness so later nodes can reference it. microskill-create
  # is a leaf (no nested workflow: node) so depth stays ≤ 1. Guarded so the advisory
  # path skips it.
  - id: provision
    workflow: microskill-create
    when: ${plan.output.scope_advisory == null}
    for_each: ${plan.output.missing_microskills}
    as: ms_spec
    depends_on: [plan]
    customize: { profile: autonomous }
    inputs:
      requirement_path: ${ms_spec.requirement}
      name: ${ms_spec.name}
      harness_root: ${workflow.inputs.harness_root}
      harness_yaml: ${workflow.inputs.harness_yaml}

  # Checkpoint (orchestrator): when the planner returns a scope_advisory instead
  # of a plan, surface it and stop. Defined before the loop body.
  - id: advise
    delegation: orchestrator
    when: ${plan.output.scope_advisory != null}
    depends_on: [plan]
    prompt: >
      The planner returned a scope advisory instead of a plan:
      ${plan.output.scope_advisory}. Present it to the user. For kind=split, list
      the candidate workflows to create separately. For kind=promote, explain the
      work is a single atomic task — recommend microskill-create instead. For
      kind=adapt, name the existing workflow that already covers this. Do not
      implement anything — stop here.

  # Checkpoint (orchestrator): build the approved plan into a finalized workflow by
  # invoking the shared build-workflow-from-plan workflow (implement ↔ evaluate loop +
  # the canonical vendor→manifest→sync→compile finalize). Runs in the main loop — the only
  # place a node may invoke a nested workflow. Guarded so the advisory path skips it. The
  # build half lives in ONE place so workflow-create and decompose-monolith-orchestrator
  # cannot drift. build-workflow-from-plan invokes no further nested workflow, so recursion
  # stays bounded.
  # First-class nested workflow call: build-workflow-from-plan runs the implement ↔ evaluate
  # loop, vendors the workflow into harness/workflow-defs/<name>/, upserts harness.yaml,
  # runs sync-harness to install .claude/workflow-defs/<name>/ + its shim, and compiles
  # .compiled/. Classified as an orchestrator checkpoint; runs in the main loop (the only place
  # nesting is allowed). build-workflow-from-plan invokes no further nested workflow, so
  # recursion stays bounded (depth = 1).
  - id: build
    workflow: build-workflow-from-plan
    when: ${plan.output.scope_advisory == null}
    depends_on: [plan, provision]
    inputs:
      plan_path: ${plan.output.plan_path}
      name: ${plan.output.name}
      requirement_path: ${workflow.inputs.requirement_path}
      harness_root: ${workflow.inputs.harness_root}
      harness_yaml: ${workflow.inputs.harness_yaml}
      staging_dir: ${workflow.inputs.staging_dir}

# Human-approval gate after `plan`: the segment boundary. Approving the plan also
# authorizes creation of the microskills it lists under missing_microskills.
gates:
  - id: approve_plan
    after: plan
    type: human_approval
    severity: hard
    prompt: Review the plan (node graph, reuse/profile decisions, microskills to be created — check each name is a reusable capability, not coupled to this workflow/step). Approve to build, revise to re-plan, or abandon.
    options: [approve, revise, abandon]

# The implement ↔ evaluate retry loop now lives inside build-workflow-from-plan, which the
# `build` node invokes; workflow-create no longer carries its own loop.

output:
  from: build
