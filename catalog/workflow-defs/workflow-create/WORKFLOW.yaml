version: 1
name: workflow-create
base: true
description: Declarative pipeline that turns a requirement into a validated WORKFLOW.yaml — plan (agent) → approval gate → provision missing microskills → implement/evaluate loop → finalize.

# Top-level workflow inputs (referenced as ${workflow.inputs.<name>}).
inputs:
  requirement:
    type: string
    required: true
    description: Natural-language description of the workflow to create.
  name:
    type: string
    required: false
    description: Optional name override for the planner's proposal.
  harness_root:
    type: string
    required: false
    default: harness
    description: Committed harness source-of-truth root. Finalize vendors the new workflow to <harness_root>/workflow-defs/<name>/; sync-harness then generates the .claude/ runtime copy + shim, and finalize compiles it.
  harness_yaml:
    type: string
    required: false
    default: harness/harness.yaml
    description: Harness manifest. Finalize upserts the component's entry here (source custom) before syncing.
  staging_dir:
    type: string
    required: false
    default: .claude/.workflow-staging/wf-create
    description: Sandbox dir; the implementer writes <staging_dir>/<name>/ before finalize moves it.

imports:
  - microskills/task-plan
  - microskills/task-implement
  - microskills/task-evaluate

# Node definition order is load-bearing: orchestrator nodes (provision, advise)
# come BEFORE the loop body so they don't split the implement/evaluate segment.
nodes:
  # Seg 1 (background): plan the workflow. The planner enumerates reusable
  # microskills/agents/workflows, designs the node graph + profile reuse, and
  # lists any microskills that must be created first. Human approves at the gate.
  - id: plan
    use: task-plan
    customize: { profile: workflow }
    inputs:
      requirement: ${workflow.inputs.requirement}
      name_override: ${workflow.inputs.name}
      staging_dir: ${workflow.inputs.staging_dir}
    output_schema:
      type: object
      required: [plan_path, name, scope_advisory, missing_microskills]
      properties:
        plan_path: { type: ["string", "null"], description: Path to the written WORKFLOW.yaml-design plan file under staging_dir, or null when a scope advisory applies. }
        name: { type: ["string", "null"] }
        scope_advisory: { type: ["object", "null"], description: "{kind: split|promote|adapt, reason, recommendation} or null." }
        missing_microskills:
          type: array
          description: Microskills the workflow needs that do not yet exist; each is created via microskill-create before implement.
          items:
            type: object
            properties:
              name: { type: string }
              requirement: { type: string }

  # Checkpoint (orchestrator): create the microskills the planner flagged as
  # missing, one per item, by invoking microskill-create with the autonomous
  # (gates-warn) profile. Runs in the main loop — the only place a node may invoke
  # a nested workflow. Guarded so the advisory path skips it.
  - id: provision
    delegation: orchestrator
    when: ${plan.output.scope_advisory == null}
    for_each: ${plan.output.missing_microskills}
    as: ms_spec
    depends_on: [plan]
    prompt: >
      Provision a missing microskill. Invoke the microskill-create workflow
      with the `autonomous` profile (no human pause) supplying requirement =
      ${ms_spec.requirement} and name = ${ms_spec.name}. That flow vendors the
      microskill into harness/microskills/${ms_spec.name}/, upserts harness.yaml, and
      runs sync-harness — installing it at .claude/microskills/${ms_spec.name}/ so later
      nodes can reference it with use: ${ms_spec.name}. If creation fails, stop and
      surface the error — do not fabricate the microskill.

  # Checkpoint (orchestrator): when the planner returns a scope_advisory instead
  # of a plan, surface it and stop. Defined before the loop body.
  - id: advise
    delegation: orchestrator
    when: ${plan.output.scope_advisory != null}
    depends_on: [plan]
    prompt: >
      The planner returned a scope advisory instead of a plan:
      ${plan.output.scope_advisory}. Present it to the user. For kind=split, list
      the candidate workflows to create separately. For kind=promote, explain the
      work is a single atomic task — recommend microskill-create instead. For
      kind=adapt, name the existing workflow that already covers this. Do not
      implement anything — stop here.

  # Seg 2 (background): the implement ↔ evaluate loop. Both body nodes are guarded
  # so the advisory path skips the loop entirely (the compiled loop breaks on a
  # fully-skipped iteration).
  - id: implement
    use: task-implement
    customize: { profile: workflow }
    when: ${plan.output.scope_advisory == null}
    depends_on: [plan, provision]
    inputs:
      plan_path: ${plan.output.plan_path}
      staging_dir: ${workflow.inputs.staging_dir}
      last_findings: ${loop.carry.last_findings}
    output_schema:
      type: object
      required: [staging_paths]
      properties:
        staging_paths: { type: array, items: { type: string } }

  - id: evaluate
    use: task-evaluate
    customize: { profile: workflow }
    when: ${plan.output.scope_advisory == null}
    depends_on: [implement, plan]
    inputs:
      staging_paths: ${implement.output.staging_paths}
      requirement: ${workflow.inputs.requirement}
      plan_path: ${plan.output.plan_path}
      name: ${plan.output.name}
      staging_base: ${workflow.inputs.staging_dir}
    output_schema:
      type: object
      required: [pass, issues]
      properties:
        pass: { type: boolean }
        issues: { type: array, items: { type: object } }

  # Checkpoint (orchestrator): vendor the approved workflow into harness/ (source of
  # truth), upsert the manifest, let sync-harness generate the .claude/ runtime copy +
  # shim + ledger, THEN compile-workflow to populate .compiled/ (sync does not compile).
  - id: finalize
    delegation: orchestrator
    when: ${plan.output.scope_advisory == null}
    depends_on: [plan, implement, evaluate]
    prompt: >
      Finalize by vendoring the approved workflow into the harness source-of-truth and syncing
      it into the runtime. The approved plan is at ${plan.output.plan_path}; staged files are
      ${implement.output.staging_paths}; evaluator verdict ${evaluate.output.pass} with issues
      ${evaluate.output.issues}.
      FIRST, if issues is non-empty (e.g. warn-severity findings that passed but were never
      fixed), present each as severity + message and AskUserQuestion (fix-and-finalize /
      accept-as-is / abandon): for fix-and-finalize, apply the fixes to the staged files before
      moving them; for abandon, stop and clean staging.
      THEN take <name> = ${plan.output.name}. Compute dest = ${workflow.inputs.harness_root}/workflow-defs/<name>.
      If dest already exists OR ${workflow.inputs.harness_yaml} already lists a workflow named
      <name>, AskUserQuestion (overwrite / pick-new-name / abandon); pick-new-name re-computes dest.
      Move the staged files into dest (WORKFLOW.yaml + profiles/* + references/*); do NOT include
      any .compiled/ dir, and do NOT write a shim or copy into .claude/ directly — sync owns those.
      THEN upsert the manifest (v2 shape): read ${workflow.inputs.harness_yaml}, and under the
      top-level `workflows:` list add (or replace in place if already present) the entry
      {name: <name>, source: custom, profiles: [the profile stems under dest/profiles]},
      preserving every other entry under `microskills:`/`workflows:` and the `version` field,
      and write it back.
      THEN run `.claude/scripts/harness-sync --apply` from the project root and parse its JSON.
      Exit 2 → surface and stop. Exit 1 (an unmanaged .claude/ path of the same name exists) →
      present the conflict and AskUserQuestion (overwrite / abandon); on overwrite re-run
      `.claude/scripts/harness-sync --apply --resolve <name>=overwrite`. Exit 0 → proceed.
      FINALLY, now that sync has vendored the source into .claude/workflow-defs/<name>/, run
      `.claude/scripts/compile-workflow <name>` to populate its .compiled/ run manifest (sync does
      not compile). Print a summary: the harness/ source path, the synced .claude/ paths + generated
      shim, and that .compiled/ was regenerated. Do not claim success on an unresolved sync conflict
      or a failed compile.

# Human-approval gate after `plan`: the segment boundary. Approving the plan also
# authorizes creation of the microskills it lists under missing_microskills.
gates:
  - id: approve_plan
    after: plan
    type: human_approval
    severity: hard
    prompt: Review the plan (node graph, reuse/profile decisions, microskills to be created). Approve to build, revise to re-plan, or abandon.
    options: [approve, revise, abandon]

# Guarded loop: repeat implement→evaluate until the evaluator passes or the cap.
loop:
  while: ${!evaluate.output.pass}
  max_iters: 3
  body: [implement, evaluate]
  carry:
    last_findings: ${evaluate.output}

output:
  from: finalize
