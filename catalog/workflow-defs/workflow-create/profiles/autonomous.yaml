# Autonomous overlay for workflow-create — used when the flow runs as a sub-step
# of another workflow (e.g. decompose-monolith-orchestrator's `provision` node
# building a missing nested workflow), where no human is present to approve the plan.
#
# It re-specifies the gates list (deep-merge replaces top-level lists) to soften
# the approve_plan gate from `hard` to `warn`. A human_approval gate ALWAYS flushes
# the segment (compile-workflow), so the `build` orchestrator node stays after its own
# boundary; but on `warn` the dispatcher emits the prompt and continues WITHOUT pausing.
# Net effect: same compiled shape, no human pause.
#
# The build half (the implement ↔ evaluate loop + finalize) runs inside
# build-workflow-from-plan, which `build` invokes; it stays non-interactive as long as the
# caller supplies a fresh, collision-free workflow name (a collision would escalate).
version: 1

gates:
  - id: approve_plan
    after: plan
    type: human_approval
    severity: warn
    prompt: >
      (autonomous) Plan generated. Running without human approval — review the
      created workflow afterward.
    options: [approve, revise, abandon]
