version: 1
name: ux-design
description: >-
  Design the UX for a UI-bearing product: author personas + user journeys from the
  requirements, generate wireframe ALTERNATIVES under distinct layout stances, judge-panel
  them to a winner, iterate the winner with the user, harden it in a bounded heuristic
  convergence loop, adversarially refute the surviving findings, and end at a signoff
  gate over machine evidence.

# Caller-supplied inputs (referenced as ${workflow.inputs.<name>}). Seam S2
# (MULTIAGENTIC-DESIGN §2.0): the parent wires requirements_path / product_kind /
# output_dir; revision_notes / max_iterations / staging_dir stay leaf-local. Files ride
# by reference (materialize: file); node outputs are paths + small counts only — no
# spill_outputs anywhere by construction.
inputs:
  requirements_path:
    type: string
    required: true
    materialize: file
    description: The approved SE requirements document this UX design must serve.
  output_dir:
    type: string
    required: true
    description: Artifact root; this stage writes under <output_dir>/ux and <output_dir>/evidence/ux.
  product_kind:
    type: string
    required: false
    description: Product classification from the parent's classify node (grounding only).
  revision_notes:
    type: string
    required: false
    description: >-
      Revision guidance threaded into every hardening round. ALSO the on_exhaust
      notes_input target — an `extend` pick at the exhaustion gate appends the human's
      guidance here.
  max_iterations:
    type: integer
    required: false
    default: 4
    description: Cap on the iterate node's in-node human rounds (the clarify-precedent bound).
  staging_dir:
    type: string
    required: false
    default: .claude/.workflow-staging/ux-design
    description: Scratch dir for the iterate node's accumulating notes ledger.

nodes:
  # ── Block 1: personas + user journeys — the coverage basis everything downstream is
  # verified against. Writes <output_dir>/ux/journeys.md and returns the screen
  # inventory (the load-bearing screens array the candidates sketch and the
  # journey-coverage critic blocks on). Read/Write only -> background.
  - id: journeys
    use: author-design-artifact
    customize: { profile: ux-journeys }
    inputs:
      primary_path: ${workflow.inputs.requirements_path}
      output_dir: ${workflow.inputs.output_dir}
    # inherits the resolved schema: {document_path, screens, summary}

  # ── Block 2: T3 judge panel — wireframe ALTERNATIVES under three layout stances.
  # Compile-time static fan-out (expand:): one generated sibling per stance.
  # {{each.item}} rides as the canonical `label` (the join key the collect/judge/
  # synthesize-panel chain ranks by); each over entry's map extras add that stance's
  # supplementary `stance` guidance to its one sibling. All three depend only on
  # `journeys` -> one rank -> ONE parallel([...]) batch.
  - id: candidate
    use: author-design-artifact
    customize: { profile: wireframe-candidate }
    phase_group: candidates
    expand:
      over:
        - item: task-flow
          inputs:
            stance: >-
              One focused linear screen path per journey — dedicate a flow to each
              task and keep it free of unrelated controls.
        - item: hub-dashboard
          inputs:
            stance: >-
              A central overview hub radiating out to task screens — every journey
              starts from, and returns to, the hub.
        - item: progressive-wizard
          inputs:
            stance: >-
              Staged step-by-step disclosure — split each task into a short wizard of
              focused steps with explicit progress.
    inputs:
      primary_path: ${journeys.output.document_path}
      context_path: ${workflow.inputs.requirements_path}
      label: "{{each.item}}"
      output_dir: ${workflow.inputs.output_dir}
    # each returns {document_path, label, summary} (small; the document is on disk)

  # Tiny deterministic fan-in: ordered candidates array + count. inputs_each desugars
  # to one <stance>: ${candidate_<stance>.output} input per over entry plus the
  # explicit depends_on — the keys (task_flow / hub_dashboard / progressive_wizard)
  # are exactly the ux-candidates profile's declared optional inputs.
  - id: collect_candidates
    use: collect-artifacts
    customize: { profile: ux-candidates }
    inputs_each: candidate

  # Three independent judges — one lens each ({{judge_lens}} swapped per profile);
  # every judge Reads ALL candidates by path and emits a schema-forced scorecard.
  # Same-rank siblings -> one parallel batch.
  - id: judge
    use: judge-artifacts
    customize: { profile: "{{each.item}}" }
    phase_group: judges
    expand:
      over: [journey-fit, cognitive-load, flow-efficiency]
    inputs:
      candidates: ${collect_candidates.output.candidates}
      requirements_path: ${workflow.inputs.requirements_path}
      context_path: ${journeys.output.document_path}

  # Deterministic vote-join: rank-sum winner (ties -> earliest candidates-order entry),
  # graft notes from runner-up strengths, full scorecards written to judges_path.
  # Tally fields (candidates_considered / judges_heard) make the panel width VISIBLE.
  # inputs_each keys (journey_fit / cognitive_load / flow_efficiency) are exactly the
  # ux profile's declared judge inputs; explicit entries coexist (no key collision).
  - id: pick_winner
    use: synthesize-panel
    customize: { profile: ux }
    inputs_each: judge
    inputs:
      candidates: ${collect_candidates.output.candidates}
      judges_path: ${workflow.inputs.output_dir}/evidence/ux/judges.json

  # ── Block 3: human iterate loop (orchestrator — the refine-requirements clarify
  # precedent). ALSO the upstream structural separator the on_exhaust own-segment rule
  # requires: without this checkpoint, pick_winner (background) would merge into the
  # loop segment and the compile would die.
  - id: iterate
    delegation: orchestrator
    prompt: >
      The judge panel picked the '${pick_winner.output.winner_label}' wireframe
      alternative (winner document: ${pick_winner.output.winner_path}; full scorecards:
      ${pick_winner.output.judges_path}; graft notes from the runners-up:
      ${pick_winner.output.graft_notes}). Product kind, as grounding (may be null):
      ${workflow.inputs.product_kind}. You run in the MAIN LOOP, so you MAY call
      AskUserQuestion. FIRST, invoke /microskill author-design-artifact (profile
      wireframe-revise) with primary_path=${pick_winner.output.winner_path},
      context_path=${journeys.output.document_path}, revision_notes=the graft notes,
      and output_dir=${workflow.inputs.output_dir} — it writes the working wireframes
      document to <output_dir>/ux/wireframes.md. THEN iterate WITH the user in rounds,
      hard-capped at ${workflow.inputs.max_iterations}: each round, present the current
      wireframes document and its screens, gather direction feedback with
      AskUserQuestion (concrete options derived from the journeys document and the
      runner-up strengths; do NOT add an "Other" option — AskUserQuestion supplies it),
      append the notes to a ledger at ${workflow.inputs.staging_dir}/iterate-notes.json,
      re-invoke the same wireframe-revise microskill on <output_dir>/ux/wireframes.md
      with those notes as revision_notes, and re-present. Stop when the user is
      satisfied or the cap is reached. THEN ask with AskUserQuestion to approve /
      revise: approve -> proceed; revise -> one more notes round, then re-present.
      (Deliberately NO reject/stop here — you are mid-pipeline and cannot stop the run;
      abandon lives at the signoff gate.) RETURN {choice, wireframes_path, rounds,
      notes}.
    # Declared RETURN contract — recorded in the checkpoint io block and enforced
    # post-step by check-step-io (a prose summary or fabricated null fails loud).
    output_schema:
      type: object
      required: [choice, wireframes_path, rounds, notes]
      properties:
        choice: { type: string }
        wireframes_path: { type: string }
        rounds: { type: integer }
        notes: { type: string }

  # ── Block 4: T4 convergence loop body — [revise -> heuristic panel ×3 (expand) ->
  # collect -> synth]; every member background, contiguous in definition order.
  # Round 1's revise is the journeys-reconciliation pass (prior_findings_path null).
  - id: revise
    use: author-design-artifact
    customize: { profile: wireframe-revise }
    inputs:
      primary_path: ${iterate.output.wireframes_path}
      context_path: ${journeys.output.document_path}
      revision_notes: ${workflow.inputs.revision_notes}
      prior_findings_path: ${loop.carry.findings_report}
      output_dir: ${workflow.inputs.output_dir}
    # rewrites <output_dir>/ux/wireframes.md IN PLACE; returns {document_path, summary}

  # The Nielsen-style heuristic scrutiny lives in the three ux dimension profiles of
  # the generalized review-dimension. change_summary = the journeys author's compact
  # result object (each rubric Reads the journeys document at its document_path);
  # context_path = the requirements document (the fidelity rubric's ground truth).
  - id: panel
    use: review-dimension
    customize: { profile: "{{each.item}}" }
    phase_group: ux-panel
    expand:
      over: [ux-journey-coverage, ux-requirements-fidelity, ux-flow-consistency]
    inputs:
      artifact_path: ${revise.output.document_path}
      change_summary: ${journeys.output}
      context_path: ${workflow.inputs.requirements_path}

  # Fan-in: keys (ux_journey_coverage / ux_requirements_fidelity / ux_flow_consistency)
  # are exactly the collect-findings ux profile's declared optional inputs.
  - id: collect
    use: collect-findings
    customize: { profile: ux }
    inputs_each: panel

  # Per-round synthesis (no refute verdicts yet — verifications stays null = "every
  # finding stands"). Writes the per-round report; the last round's stands.
  - id: synth
    use: synthesize-review
    customize: { profile: design }
    inputs:
      findings: ${collect.output.findings}
      report_path: ${workflow.inputs.output_dir}/evidence/ux/panel-review.md
    # design-profile schema: {verdict, blocker_count, confirmed_count, refuted_count,
    #   needs_human_count, findings, red_items, report_path, summary}

  # ── Block 5: T5 advisory triage — guarded orchestrator node. TWO jobs: (1) the
  # DOWNSTREAM structural separator the on_exhaust own-segment rule requires; (2)
  # accept-with-record triage after an explicit `accept` at the exhaustion gate.
  # Reachable ONLY interactively: headless-unconverged parks at loop_exhaust
  # (on_headless: fail) BEFORE this node; converged runs skip it (guard false -> null).
  - id: triage_unconverged
    delegation: orchestrator
    when: ${!loop.output.converged}
    prompt: >
      The hardening loop hit its round cap and you accepted the unconverged wireframes
      at the exhaustion gate. The still-open findings (${synth.output.blocker_count}
      blocker(s), ${synth.output.needs_human_count} needs_human) are recorded at
      ${synth.output.report_path} — Read that report (and its .json sidecar) for the
      full set; the prompt deliberately carries paths and counts only.
      Triage them WITH the user (AskUserQuestion): for each remaining blocker/major,
      either record it as an accepted escalation ({kind, ref, detail}), or fold it into
      AT MOST ONE bounded remediation round — re-invoke /microskill
      author-design-artifact (profile wireframe-revise) with
      primary_path=${revise.output.document_path},
      context_path=${journeys.output.document_path}, known_findings=the selected
      findings, and output_dir=${workflow.inputs.output_dir} — then record whatever
      remains as remaining_escalations. IF the remediation round ran, re-run the
      verifier so the machine evidence is re-committed through this node's RETURN:
      invoke /microskill review-dimension once per profile (ux-journey-coverage,
      ux-requirements-fidelity, ux-flow-consistency) with artifact_path=the revised
      document, change_summary=${journeys.output}, and
      context_path=${workflow.inputs.requirements_path}; fan the three results in via
      /microskill collect-findings (profile ux); synthesize via /microskill
      synthesize-review (profile design) with
      report_path=${workflow.inputs.output_dir}/evidence/ux/panel-review-post-triage.md;
      and return that path as refreshed_report_path plus its {blocker_count,
      confirmed_count, refuted_count, needs_human_count} as post_counts. If NO
      remediation ran, return refreshed_report_path: null and post_counts: null. (NO
      stop promise here; abandon lives at the signoff gate.) RETURN {action,
      remaining_escalations, refreshed_report_path, post_counts}.
    # The uniform T5 post-remediation RETURN core (MULTIAGENTIC-DESIGN §6 W2).
    output_schema:
      type: object
      required: [action, remaining_escalations, refreshed_report_path, post_counts]
      properties:
        action: { type: string }
        remaining_escalations: { type: array }
        refreshed_report_path: { type: ["string", "null"] }
        post_counts: { type: ["object", "null"] }

  # ── Block 6: T2 refute fan-out — post-loop adversarial pass over the surviving
  # findings (for_each is illegal inside loop.body; post-loop refutation only removes
  # false positives — soften-only, sound). Refs to loop-body nodes read the LAST
  # iteration's committed outputs. depends_on triage is a PURE ORDERING edge (no ref
  # carries it; its guarded-skip null is legal upstream). N=1 seat by the pinned W4
  # rule: findings already survived a panel.
  - id: refute
    use: verify-finding
    customize: { profile: document }
    depends_on: [triage_unconverged]
    for_each: ${synth.output.findings}
    as: finding
    max_parallel: 4
    inputs:
      finding: ${finding}
      artifact_path: ${revise.output.document_path}
    # per-item verdicts consumed downstream as ${refute.items}

  # Final synthesis: joins refute verdicts to findings, drops refuted/false-positive
  # ones, writes the FINAL report — the signoff gate's anchor.
  - id: final_synthesize
    use: synthesize-review
    customize: { profile: design }
    inputs:
      findings: ${synth.output.findings}
      verifications: ${refute.items}
      report_path: ${workflow.inputs.output_dir}/evidence/ux/review.md

  # ── Block 7: stage-record assembly (after the signoff gate). Null inputs are
  # RECORDED, never branched on. ${signoff.output.choice} is a gate-id ref — legal,
  # implies no edge; ordering comes from the final_review ref + the gate checkpoint.
  # ${triage_unconverged.output} rides as a WHOLE null-safe value (null = converged);
  # screens come from the journeys screen inventory (the schema-carried source — the
  # wireframe-revise contract keeps journey_refs current but returns no screens field).
  # gates_mode is the W1 profile-literal convention: the autonomous overlay patches it
  # to auto-default in the same patch set that flips the iterate prompt.
  - id: finalize
    use: assemble-evidence
    customize: { profile: ux-stage }
    inputs:
      wireframes_path: ${revise.output.document_path}
      screens: ${journeys.output.screens}
      signoff: ${signoff.output.choice}
      rounds: ${loop.output.rounds}
      converged: ${loop.output.converged}
      judge_record: ${pick_winner.output}
      iterate_record: ${iterate.output}
      final_review: ${final_synthesize.output}
      triage_record: ${triage_unconverged.output}
      gates_mode: human
      output_dir: ${workflow.inputs.output_dir}
    # ux-stage profile schema (REPLACES wholesale): {ux_dir, wireframes_path, screens
    #   (minItems 1), signoff, rounds, gates_taken, evidence, escalations, summary}

# The leaf's ONE loop. Body lists the GENERATED panel siblings (expand desugars
# pre-validation). AUTHORING CAVEAT: an overlay that patches panel.over MUST co-patch
# loop.body in the same overlay and ship the matching collect-findings profile.
loop:
  until: ${synth.output.verdict == 'approve'}
  max_iters: 3
  body: [revise, panel_ux_journey_coverage, panel_ux_requirements_fidelity,
         panel_ux_flow_consistency, collect, synth]
  carry:
    findings_report: ${synth.output.report_path}   # by PATH — the loop hot path never carries finding prose through args (mirrors the technical-design HLD loop)
  on_exhaust:
    action: escalate                     # synthetic loop_exhaust human_approval gate
    prompt: >-
      The UX heuristic panel still refuses the wireframes after the declared round
      cap — extend with guidance, accept the unconverged set (recorded as an
      escalation), or abandon?
    options: [extend, accept, abandon]
    notes_input: revision_notes          # extend folds guidance into the declared input
    on_headless: fail                    # honest park; morning path = /workflow ux-design pickup
    # NO default — default: extend is engine-refused; default: accept is BANNED
    # (silent degradation, arch-rigor §0).

gates:
  # T7 take-default signoff — the stage's terminal gate, anchored on a BACKGROUND
  # node. Its take_default approve is floor-guarded by construction: an unconverged
  # headless loop parks at loop_exhaust BEFORE this gate is ever reached.
  - id: signoff
    after: final_synthesize
    type: human_approval
    severity: hard
    prompt: >-
      Sign off the UX design: the wireframes were judge-panel selected, human/agent
      iterated, hardened against the UX heuristic panel until approval (or explicitly
      accepted unconverged — see the verdict), and the surviving findings adversarially
      refuted. Where a triage remediation record exists, its post-triage report
      (evidence/ux/panel-review-post-triage.md) is authoritative over the raw presented
      fields, which render committed pre-remediation values. Approve to record signoff
      and assemble the stage output; revise to re-run the refute + final-synthesis
      segment with notes; abandon to stop the run.
    options: [approve, revise, abandon]
    default: approve
    on_headless: take_default
    present:                             # mechanical paths only — every producer pre-anchor
      - final_synthesize.output.verdict
      - final_synthesize.output.blocker_count
      - final_synthesize.output.confirmed_count
      - final_synthesize.output.refuted_count
      - final_synthesize.output.needs_human_count
      - final_synthesize.output.summary
      - pick_winner.output.winner_label
      - pick_winner.output.candidates_considered
      - pick_winner.output.judges_heard
      - read_file: final_synthesize.output.report_path
      - read_file: pick_winner.output.judges_path
      - read_file: revise.output.document_path

# The S2 stage record the parent threads downstream (null-safe whole value on the
# parent's guarded ux node).
output:
  from: finalize
