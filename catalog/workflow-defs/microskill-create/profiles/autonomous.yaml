# Autonomous overlay for microskill-create — used when the flow runs as a
# sub-step of another workflow (e.g. workflow-create's `provision` node), where
# no human is present to approve the plan.
#
# Two pure flips:
#  1. `nodes: patch` swaps the plan_rvs child onto the AUTONOMOUS plan-rvs profile
#     (microskill-create-autonomous), which adds the bounded convergence loop +
#     wires plan.last_findings = ${loop.carry.findings}. The interactive base runs
#     plan-rvs LOOP-LESS (one pass) and leans on the human at approve_plan; the
#     autonomous variant re-plans against surviving findings until it converges or
#     hits the cap. (implement-rvs already carries its own loop in both modes.)
#  2. `gate_mode: auto` makes the dispatcher take each gate's declared default and
#     record it VERBATIM (never a fabricated pick); the `gates: patch` declares that
#     default on approve_plan by id — after/type/severity/options/prompt are
#     inherited from the base gate, not restated. The gate stays hard +
#     human_approval, so the compiled partition is unchanged; under gate_mode: auto
#     the dispatcher records {choice: approve} and continues WITHOUT pausing.
#
# The doc-declared gate_mode also WINS over a parent's inherited `--gate-mode`
# flag, so this profile is headless regardless of how the parent runs. finalize
# stays non-interactive as long as the caller supplies a fresh, collision-free
# microskill name (a collision would escalate).
version: 1

gate_mode: auto

nodes:
  patch:
    - id: plan_rvs
      customize: { profile: microskill-create-autonomous }

gates:
  patch:
    - id: approve_plan
      default: approve
