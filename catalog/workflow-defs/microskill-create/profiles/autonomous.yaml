# Autonomous overlay for microskill-create — used when the flow runs as a
# sub-step of another workflow (e.g. workflow-create's `provision` node), where
# no human is present to approve the plan.
#
# It `patch`es the approve_plan gate by id (gates:{patch:[...]}) to soften its
# severity from `hard` to `warn` and swap in an autonomous prompt — after/type/options
# are inherited from the base gate, not restated. A human_approval gate ALWAYS
# flushes the segment (compile-workflow), so the implement/evaluate loop stays in
# its own segment; but on `warn` the dispatcher emits the prompt and continues
# WITHOUT pausing. Net effect: same compiled shape, no human pause.
#
# finalize stays non-interactive as long as the caller supplies a fresh,
# collision-free microskill name (a collision would escalate).
version: 1

gates:
  patch:
    - id: approve_plan
      severity: warn
      prompt: >
        (autonomous) Plan generated. Running without human approval — review the
        created microskill afterward.
