version: 1
name: microskill-create
base: true
description: Create a microskill from a requirement — plan-rvs (planner-in-review) → human approval gate → implement-rvs (self-correcting implement→review→verify→synthesize loop) → finalize. Both RVS stages run as inlined first-class workflows (profile microskill-create).

# Top-level workflow inputs (referenced as ${workflow.inputs.<name>}).
inputs:
  requirement_path:
    type: string
    required: true
    materialize: file
    description: >-
      Natural-language description of the microskill to create. plan-rvs's planner
      Reads the path, and each RVS stage threads it as the review panel's semantic
      ground truth — the raw requirement is the ground truth (no upstream refine).
  name:
    type: string
    required: false
    description: Optional name override for the planner's proposal.
  harness_root:
    type: string
    required: false
    default: harness
    description: Committed harness source-of-truth root. Finalize vendors the new microskill to <harness_root>/microskills/<name>/; sync-harness then generates the .claude/ runtime copy + shim.
  harness_yaml:
    type: string
    required: false
    default: harness/harness.yaml
    description: Harness manifest. Finalize upserts the component's entry here (source custom) before syncing.
  staging_dir:
    type: string
    required: false
    default: .claude/.workflow-staging/current
    description: Sandbox dir where the implementer writes the draft before finalize moves it.

imports:
  - plan-rvs
  - implement-rvs

# Parameters for the SHARED finalize protocol (_snippets/finalize-protocol.md,
# included below via {{snippet:finalize-protocol}} — snippets resolve before vars,
# so these {{...}} tokens parameterize the shared prose). workflow-create
# carries the workflow-domain twin of this block; the protocol text itself lives in
# ONE place so the two finalizes cannot drift.
vars:
  finalize_kind: microskill
  finalize_plan_ref: ${plan_rvs.output.plan_path}
  finalize_name_source: <name> from the plan
  finalize_dest_subdir: microskills
  finalize_staged_layout: MICROSKILL.md + profiles/*
  # The quality-node refs the shared finalize-protocol presents before vendoring.
  # The 2026-06-21 rewire (sub-PR 2) routes them through the implement-rvs loop's
  # synth output (the verdict + surviving findings the RVS cycle converged on).
  finalize_verdict_ref: ${impl_rvs.output.verdict}
  finalize_issues_ref: ${impl_rvs.output.findings}
  # The finalize-protocol snippet is parameterized on the staging-paths ref; the
  # implement-rvs loop echoes the implementer's staging_paths out of synth.
  finalize_staging_ref: ${impl_rvs.output.staging_paths}
  finalize_epilogue: >-
    done. Print a summary: the harness/ source path, the synced .claude/ paths +
    generated shim .claude/commands/<name>.md, and the manifest entry. Do not claim
    success on an unresolved sync conflict.

nodes:
  # Plan the microskill from the RAW requirement via the reusable plan-stage RVS
  # (planner-in-review: plan→review×N→verify→synth over the plan.yaml). The plan
  # phase's adversarial review panel + the approve_plan human gate below own
  # requirement quality (an ambiguous requirement surfaces as a plan the human
  # revises → re-plans) — there is no upstream refine front-end. The base ships
  # LOOP-LESS (a single pass; the approve_plan gate is the backstop); the autonomous
  # pipeline profile swaps in plan-rvs[microskill-create-autonomous], which adds the
  # bounded convergence loop. A STATIC `workflow:` node with EXPLICIT inputs (no
  # `wire: auto`, which would suppress inlining), so the compiler INLINES it: the
  # plan-rvs nodes splice into this host (the autonomous loop becomes one region).
  # plan_rvs is the first node, so it has no depends_on. Output carries {plan_path,
  # name, scope_advisory, verdict, findings}; the HUMAN approves it at the gate below.
  - id: plan_rvs
    workflow: plan-rvs
    customize: { profile: microskill-create }
    inputs:
      requirement_path: ${workflow.inputs.requirement_path}
      name_override: ${workflow.inputs.name}
      staging_dir: ${workflow.inputs.staging_dir}

  # When the planner returns a scope_advisory instead of a plan, surface it and
  # stop — no microskill gets built. Guarded by `when`; the guard also if-wraps the
  # impl_rvs region + finalize below so the advisory path skips the build entirely.
  - id: advise
    delegation: orchestrator
    when: ${plan_rvs.output.scope_advisory != null}
    prompt: >
      The planner returned a scope advisory instead of a plan:
      ${plan_rvs.output.scope_advisory}. Present it to the user. For kind=split, list
      the candidate atomic microskills to create separately. For kind=promote,
      explain that the requirement needs a full skill (branches/gates), not a
      single atomic microskill. Do not implement anything — stop here.

  # Build the approved plan into a microskill draft via the reusable implement-rvs
  # loop (the self-correcting implement→review→verify→synthesize cycle). implement-rvs
  # is the PURE loop — it has NO finalize; it returns {verdict, findings,
  # staging_paths} and the HOST owns the single vendor→manifest→sync finalize (the
  # `finalize` node below). A STATIC `workflow:` node with EXPLICIT inputs (no
  # `wire: auto`), so the compiler INLINES it as ONE guarded do/while loop region
  # (region-guarded on the same `when`), keeping the pipeline flat. The explicit
  # depends_on: [plan_rvs] is LOAD-BEARING for contiguity — it anchors the inlined
  # region's zero-dep internal node (implement-rvs's catalog_index, depends_on: [])
  # after the plan_rvs region; the inputs refs (${plan_rvs.output.plan_path}) alone
  # only order impl_rvs's implement, leaving catalog_index free to float across a
  # region boundary (the "zero-dep node floats" lesson).
  - id: impl_rvs
    workflow: implement-rvs
    customize: { profile: microskill-create }
    when: ${plan_rvs.output.scope_advisory == null}
    depends_on: [plan_rvs]
    inputs:
      plan_path: ${plan_rvs.output.plan_path}
      name: ${plan_rvs.output.name}
      requirement_path: ${workflow.inputs.requirement_path}
      staging_dir: ${workflow.inputs.staging_dir}

  # Vendor the approved microskill into harness/ (source of truth), upsert the
  # manifest, then let sync-harness generate the .claude/ runtime copy + slash
  # shim + ledger. No agent/use → an orchestrator-native step.
  # The prompt is the SHARED finalize protocol (one snippet, parameterized by the
  # vars: block above) — edit _snippets/finalize-protocol.md, not a per-def copy.
  # The finalize_staging_ref ${impl_rvs.output.staging_paths} (rendered into the
  # prompt) anchors finalize after the impl_rvs region — finalize is a single node,
  # so the ref-implied edge suffices and an explicit depends_on: [impl_rvs] would be
  # redundant noise (the ${plan_rvs...} when-ref also keeps it past plan_rvs).
  - id: finalize
    delegation: orchestrator
    when: ${plan_rvs.output.scope_advisory == null}
    prompt: "{{snippet:finalize-protocol}}"

# Human-approval gate after `plan_rvs` (the sole gate — Gate 1). The plan-rvs
# review evidence is the whole-branch-confirm material the human signs off on; it
# also backstops requirement quality, since there is no upstream refine gate.
gates:
  - id: approve_plan
    name: "Approve microskill plan"
    after: plan_rvs
    type: human_approval
    severity: hard
    prompt: Review the plan — including whether the name is a reusable capability (not coupled to a caller, step, or a domain a profile could carry). Approve to implement, revise to re-plan, or abandon.
    options: [approve, revise, abandon]

# No top-level loop: the convergence loops now live INSIDE the inlined plan-rvs
# (autonomous) and implement-rvs children, each spliced in as its own loop region.

output:
  from: finalize
