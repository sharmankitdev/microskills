version: 1
name: microskill-create
base: true
description: Create a microskill from a requirement — plan → human approval gate → implement/evaluate loop → finalize. The plan/implement/evaluate phases run the generic microskills (profile microskill).

# Top-level workflow inputs (referenced as ${workflow.inputs.<name>}).
inputs:
  requirement:
    type: string
    required: true
    description: Natural-language description of the microskill to create.
  name:
    type: string
    required: false
    description: Optional name override for the planner's proposal.
  harness_root:
    type: string
    required: false
    default: harness
    description: Committed harness source-of-truth root. Finalize vendors the new microskill to <harness_root>/microskills/<name>/; sync-harness then generates the .claude/ runtime copy + shim.
  harness_yaml:
    type: string
    required: false
    default: harness/harness.yaml
    description: Harness manifest. Finalize upserts the component's entry here (source custom) before syncing.
  staging_dir:
    type: string
    required: false
    default: .claude/.workflow-staging/current
    description: Sandbox dir where the implementer writes the draft before finalize moves it.

imports:
  - microskills/task-plan
  - microskills/task-implement
  - microskills/task-evaluate

nodes:
  # Seg 1 (background): plan the microskill. The planner is autonomous — it
  # returns a structured plan (or a scope_advisory); the HUMAN approves it at
  # the gate below, which is the orchestrator checkpoint.
  - id: plan
    use: task-plan
    customize: { profile: microskill }
    inputs:
      requirement: ${workflow.inputs.requirement}
      name_override: ${workflow.inputs.name}
      staging_dir: ${workflow.inputs.staging_dir}
    output_schema:
      type: object
      required: [plan_path, scope_advisory]
      properties:
        plan_path: { type: ["string", "null"], description: Path to the written plan YAML file under staging_dir, or null when a scope advisory applies. }
        name: { type: ["string", "null"] }
        scope_advisory: { type: ["object", "null"] }

  # Checkpoint (orchestrator): when the planner returns a scope_advisory instead
  # of a plan, surface it and stop — no microskill gets built. Guarded by `when`;
  # defined BEFORE the loop body so it doesn't split the implement/evaluate seg.
  - id: advise
    delegation: orchestrator
    when: ${plan.output.scope_advisory != null}
    depends_on: [plan]
    prompt: >
      The planner returned a scope advisory instead of a plan:
      ${plan.output.scope_advisory}. Present it to the user. For kind=split, list
      the candidate atomic microskills to create separately. For kind=promote,
      explain that the requirement needs a full skill (branches/gates), not a
      single atomic microskill. Do not implement anything — stop here.

  # Seg 2 (background): the implement ↔ evaluate loop. Fully autonomous — runs
  # as a JS while inside ONE segment, no human interaction between rounds. Both
  # body nodes are guarded so the advisory path skips the loop entirely.
  - id: implement
    use: task-implement
    customize: { profile: microskill }
    when: ${plan.output.scope_advisory == null}
    depends_on: [plan]
    inputs:
      plan_path: ${plan.output.plan_path}
      staging_dir: ${workflow.inputs.staging_dir}
      last_findings: ${loop.carry.last_findings}
    output_schema:
      type: object
      required: [staging_paths]
      properties:
        staging_paths: { type: array, items: { type: string } }

  - id: evaluate
    use: task-evaluate
    customize: { profile: microskill }
    when: ${plan.output.scope_advisory == null}
    depends_on: [implement, plan]
    inputs:
      staging_paths: ${implement.output.staging_paths}
      requirement: ${workflow.inputs.requirement}
      plan_path: ${plan.output.plan_path}
    output_schema:
      type: object
      required: [pass, issues]
      properties:
        pass: { type: boolean }
        issues: { type: array, items: { type: object } }

  # Checkpoint (orchestrator): vendor the approved microskill into harness/ (source
  # of truth), upsert the manifest, then let sync-harness generate the .claude/
  # runtime copy + slash shim + ledger. No agent/use → an orchestrator-native step.
  - id: finalize
    delegation: orchestrator
    when: ${plan.output.scope_advisory == null}
    depends_on: [plan, implement, evaluate]
    prompt: >
      Finalize by vendoring the approved microskill into the harness source-of-truth and
      syncing it into the runtime. The approved plan is at ${plan.output.plan_path}; staged
      files are ${implement.output.staging_paths}; evaluator verdict ${evaluate.output.pass}
      with issues ${evaluate.output.issues}.
      FIRST, if issues is non-empty (e.g. warn-severity findings that passed but were never
      fixed), present each as severity + message and AskUserQuestion (fix-and-finalize /
      accept-as-is / abandon): for fix-and-finalize, apply the fixes to the staged files
      before moving them; for abandon, stop and clean staging.
      THEN take <name> from the plan. Compute dest = ${workflow.inputs.harness_root}/microskills/<name>.
      If dest already exists OR ${workflow.inputs.harness_yaml} already lists a microskill named
      <name>, AskUserQuestion (overwrite / pick-new-name / abandon); pick-new-name re-computes dest.
      Move the staged files into dest (MICROSKILL.md + profiles/*). Do NOT write a slash shim or
      copy into .claude/ directly — sync owns those.
      THEN upsert the manifest (v2 shape): read ${workflow.inputs.harness_yaml}, and under the
      top-level `microskills:` list add (or replace in place if already present) the entry
      {name: <name>, source: custom, profiles: [the profile stems under dest/profiles]},
      preserving every other entry under `microskills:`/`workflows:` and the file's `version`
      field, and write it back.
      THEN run `.claude/scripts/harness-sync --apply` from the project root and parse its JSON.
      Exit 2 → surface the error and stop. Exit 1 (an unmanaged .claude/ path of the same name
      exists) → present the conflict and AskUserQuestion (overwrite / abandon); on overwrite re-run
      `.claude/scripts/harness-sync --apply --resolve <name>=overwrite`. Exit 0 → done.
      Print a summary: the harness/ source path, the synced .claude/ paths + generated shim
      .claude/commands/<name>.md, and the manifest entry. Do not claim success on an unresolved
      sync conflict.

# Human-approval gate after `plan` — the segment boundary between Seg 1 and Seg 2.
gates:
  - id: approve_plan
    after: plan
    type: human_approval
    severity: hard
    prompt: Review the plan — including whether the name is a reusable capability (not coupled to a caller, step, or a domain a profile could carry). Approve to implement, revise to re-plan, or abandon.
    options: [approve, revise, abandon]

# Guarded loop: repeat implement→evaluate until the evaluator passes or the cap.
# max_iters is customizable via a profile overlay (deep-merged onto this def).
loop:
  while: ${!evaluate.output.pass}
  max_iters: 3
  body: [implement, evaluate]
  carry:
    last_findings: ${evaluate.output}

output:
  from: finalize
