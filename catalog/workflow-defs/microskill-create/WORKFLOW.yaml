version: 1
name: microskill-create
base: true
description: Create a microskill from a requirement — plan → human approval gate → implement/evaluate loop → finalize. The plan/implement/evaluate phases run the generic microskills (profile microskill).

# Top-level workflow inputs (referenced as ${workflow.inputs.<name>}).
inputs:
  requirement_path:
    type: string
    required: true
    materialize: file
    description: >-
      Natural-language description of the microskill to create. task-plan /
      task-evaluate Read the path.
  name:
    type: string
    required: false
    description: Optional name override for the planner's proposal.
  harness_root:
    type: string
    required: false
    default: harness
    description: Committed harness source-of-truth root. Finalize vendors the new microskill to <harness_root>/microskills/<name>/; sync-harness then generates the .claude/ runtime copy + shim.
  harness_yaml:
    type: string
    required: false
    default: harness/harness.yaml
    description: Harness manifest. Finalize upserts the component's entry here (source custom) before syncing.
  staging_dir:
    type: string
    required: false
    default: .claude/.workflow-staging/current
    description: Sandbox dir where the implementer writes the draft before finalize moves it.

imports:
  - microskills/task-plan
  - microskills/task-implement
  - microskills/task-evaluate

# Parameters for the SHARED finalize protocol (_snippets/finalize-protocol.md,
# included below via {{snippet:finalize-protocol}} — snippets resolve before vars,
# so these {{...}} tokens parameterize the shared prose). build-workflow-from-plan
# carries the workflow-domain twin of this block; the protocol text itself lives in
# ONE place so the two finalizes cannot drift.
vars:
  finalize_kind: microskill
  finalize_plan_ref: ${plan.output.plan_path}
  finalize_name_source: <name> from the plan
  finalize_dest_subdir: microskills
  finalize_staged_layout: MICROSKILL.md + profiles/*
  # The quality-node refs the shared finalize-protocol presents before vendoring.
  # microskill-create keeps the single-LLM evaluator (its RVS rewire is sub-PR 5),
  # so these resolve to the evaluate node — byte-identical to the pre-vars snippet.
  finalize_verdict_ref: ${evaluate.output.pass}
  finalize_issues_ref: ${evaluate.output.issues}
  finalize_epilogue: >-
    done. Print a summary: the harness/ source path, the synced .claude/ paths +
    generated shim .claude/commands/<name>.md, and the manifest entry. Do not claim
    success on an unresolved sync conflict.

nodes:
  # Plan the microskill. The planner is autonomous — it returns a structured
  # plan (or a scope_advisory); the HUMAN approves it at the gate below. Node
  # output shape: the resolved task-plan (microskill profile) output_schema
  # (inherited).
  - id: plan
    use: task-plan
    customize: { profile: microskill }
    inputs:
      requirement_path: ${workflow.inputs.requirement_path}
      name_override: ${workflow.inputs.name}
      staging_dir: ${workflow.inputs.staging_dir}

  # When the planner returns a scope_advisory instead of a plan, surface it and
  # stop — no microskill gets built. Guarded by `when`; defined BEFORE the loop
  # body so it doesn't split the implement/evaluate loop.
  - id: advise
    delegation: orchestrator
    when: ${plan.output.scope_advisory != null}
    prompt: >
      The planner returned a scope advisory instead of a plan:
      ${plan.output.scope_advisory}. Present it to the user. For kind=split, list
      the candidate atomic microskills to create separately. For kind=promote,
      explain that the requirement needs a full skill (branches/gates), not a
      single atomic microskill. Do not implement anything — stop here.

  # The implement ↔ evaluate loop. Fully autonomous — runs as a JS while inside
  # ONE segment, no human interaction between rounds. Both body nodes are
  # guarded so the advisory path skips the loop entirely.
  - id: implement
    use: task-implement
    customize: { profile: microskill }
    when: ${plan.output.scope_advisory == null}
    inputs:
      plan_path: ${plan.output.plan_path}
      staging_dir: ${workflow.inputs.staging_dir}
      last_findings: ${loop.carry.last_findings}

  - id: evaluate
    use: task-evaluate
    customize: { profile: microskill }
    when: ${plan.output.scope_advisory == null}
    inputs:
      staging_paths: ${implement.output.staging_paths}
      requirement_path: ${workflow.inputs.requirement_path}
      plan_path: ${plan.output.plan_path}

  # Vendor the approved microskill into harness/ (source of truth), upsert the
  # manifest, then let sync-harness generate the .claude/ runtime copy + slash
  # shim + ledger. No agent/use → an orchestrator-native step.
  # The prompt is the SHARED finalize protocol (one snippet, parameterized by the
  # vars: block above) — edit _snippets/finalize-protocol.md, not a per-def copy.
  - id: finalize
    delegation: orchestrator
    when: ${plan.output.scope_advisory == null}
    prompt: "{{snippet:finalize-protocol}}"

# Human-approval gate after `plan`.
gates:
  - id: approve_plan
    name: "Approve microskill plan"
    after: plan
    type: human_approval
    severity: hard
    prompt: Review the plan — including whether the name is a reusable capability (not coupled to a caller, step, or a domain a profile could carry). Approve to implement, revise to re-plan, or abandon.
    options: [approve, revise, abandon]

# Guarded loop: repeat implement→evaluate until the evaluator passes or the cap.
# max_iters is customizable via a profile overlay (deep-merged onto this def).
loop:
  while: ${!evaluate.output.pass}
  max_iters: 3
  body: [implement, evaluate]
  carry:
    last_findings: ${evaluate.output}
  on_exhaust:
    # Cap exhaustion is a verdict, not a budget overrun: delegate it to the
    # orchestrator instead of letting a still-failing draft flow into finalize.
    # extend re-runs the loop with the committed carry (guidance appended to the
    # materialized requirement file); accept proceeds on an explicit human
    # choice; headless runs PARK resumable here (on_headless: fail — the
    # do-the-work-overnight, approve-in-the-morning pattern).
    action: escalate
    prompt: The implement-evaluate loop hit its round cap with the evaluator still failing - extend with another round budget (optionally with guidance), accept the draft as-is, or abandon?
    options: [extend, accept, abandon]
    notes_input: requirement_path
    on_headless: fail

output:
  from: finalize
