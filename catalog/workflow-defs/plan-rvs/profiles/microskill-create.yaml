version: 1
# plan-rvs / microskill-create — retarget the plan critique to the MICROSKILL domain, LOOP-LESS
# (single pass; the host's approve_plan gate is the backstop). The planner + critique panel +
# fan-in + verify switch to the ms plan-stage profiles; synth (create-plan-rvs) is domain-neutral.
# Swapping review.expand.over MUST co-patch loop.body — but the base is loop-less, so there is no
# loop to co-patch here (the *-autonomous variant carries the ms loop body).
nodes:
  patch:
    - id: plan
      customize: { profile: microskill }
    - id: review
      expand:
        over:
          - plan-ms-completeness
          - plan-ms-scope-fit
          - plan-ms-input-contract
          - plan-ms-output-contract
          - plan-ms-name-capability
          - plan-ms-failure-coverage
    - id: collect
      customize: { profile: plan-ms-create }
    - id: verify
      customize: { profile: plan-microskill }
