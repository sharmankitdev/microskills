version: 1
name: plan-rvs
description: >
  The reusable plan-stage RVS — a planner-in-review cycle: plan→review→verify→synthesize over
  the PLAN object (the planner's plan.yaml), producing {plan_path, scope_advisory, name} plus the
  review verdict/findings. The BASE ships LOOP-LESS (a single pass; the host create pipeline's
  approve_plan gate is the backstop). The autonomous overlays ADD the convergence loop (re-plan
  on carried findings via task-plan's last_findings, exit on approve OR a scope_advisory). Domain
  is profile-selected: workflow-create (plan-wf-* critique, baked here) vs microskill-create
  (plan-ms-* critique). A static `workflow: plan-rvs` node inlines into the host; the autonomous
  variant inlines as a guarded/ungarded loop region (compile-time inlining).

inputs:
  requirement_path:
    type: string
    required: true
    materialize: file
    description: >-
      The originating requirement — the planner Reads it, AND each critique dimension reads it as
      context_path (the semantic ground truth). The on_exhaust "extend" choice appends human
      guidance here so the next re-plan round re-reads it.
  name_override:
    type: string
    required: false
    description: Optional kebab-case name the planner folds into the plan (echoed out as name).
  staging_dir:
    type: string
    required: true
    description: Sandbox dir; the planner writes plan.yaml here and the review evidence lands under here.

imports:
  - microskills/task-plan
  - microskills/review-dimension
  - microskills/verify-finding
  - microskills/synthesize-review

# Plan-stage RVS. The base is a single linear pass (no loop:); the autonomous overlays add the
# loop. synth is the TERMINAL node so a host gate `after: plan-rvs` anchors after the full review,
# and synth (create-plan-rvs) echoes the planner identity so the single exit carries
# {plan_path, scope_advisory, name, verdict, findings}.
nodes:
  # Plan the artifact. Base passes no last_findings (no loop); the autonomous overlay patches in
  # last_findings: ${loop.carry.findings} so round 2+ re-plans against the surviving findings.
  - id: plan
    use: task-plan
    customize: { profile: workflow }
    phase_group: plan
    inputs:
      requirement_path: ${workflow.inputs.requirement_path}
      name_override: ${workflow.inputs.name_override}
      staging_dir: ${workflow.inputs.staging_dir}

  # The plan-critique panel — ONE expand template → generated review_<dim> siblings, each running
  # review-dimension under that plan-stage rubric. They depend only on plan, so they share a rank
  # → ONE parallel([...]) batch. artifact_path = the written plan.yaml; context_path = the
  # requirement. The microskill-create profile swaps this `over` list (+ co-patched loop.body).
  - id: review
    use: review-dimension
    customize: { profile: "{{each.item}}" }
    phase_group: review
    expand:
      over:
        - plan-wf-completeness
        - plan-wf-graph-correctness
        - plan-wf-input-contract
        - plan-wf-control-flow
        - plan-wf-reuse-survey
        - plan-wf-scope-fit
        - plan-wf-name-capability
        - plan-wf-failure-path-coverage
        - plan-wf-model-tiering
    inputs:
      artifact_path: ${plan.output.plan_path}
      context_path: ${workflow.inputs.requirement_path}

  # Adversarially verify each panel finding against the SAME plan.yaml the panel saw. The verify
  # fan-out reads the review panel DIRECTLY via the panel-aggregate ref ${review[].findings} (the
  # native flatMap-between-review-and-verify pattern) — no collect fan-in node. for_each is its own
  # await parallel(map(...)) rank; run every round so false positives drop. Each panel finding now
  # carries its own `dimension` field (stamped upstream by review-dimension).
  - id: verify
    use: verify-finding
    customize: { profile: plan-workflow }
    phase_group: verify
    for_each: ${review[].findings}
    as: finding
    max_parallel: 4
    inputs:
      finding: ${finding}
      artifact_path: ${plan.output.plan_path}

  # Synthesize the verified critique into a verdict + ranked must-fix, and ECHO the planner
  # identity (create-plan-rvs profile) so the single exit carries {plan_path, scope_advisory,
  # name, missing_microskills, verdict, findings}. Plan stage has no floor → floor_findings
  # folds nothing. missing_microskills is the workflow-domain planner's list of microskills the
  # planned workflow needs but that do not exist yet (task-plan's workflow profile emits it;
  # the microskill profile does not → the ref resolves null, harmless); echoing it through synth
  # lets a host's provision for_each read ${plan_rvs.output.missing_microskills} off the single
  # aggregate exit (the loop-region terminal), instead of the early plan node.
  - id: synth
    use: synthesize-review
    customize: { profile: create-plan-rvs }
    phase_group: synthesize
    inputs:
      findings: ${review[].findings}
      verifications: ${verify.items}
      plan_path: ${plan.output.plan_path}
      name: ${plan.output.name}
      scope_advisory: ${plan.output.scope_advisory}
      missing_microskills: ${plan.output.missing_microskills}
      report_path: ${workflow.inputs.staging_dir}/evidence/plan-review.md

# The single aggregate exit. synth carries the {plan_path, scope_advisory, name,
# missing_microskills, verdict, findings} contract via the create-plan-rvs profile, and is the
# terminal node so a host gate `after: <this node>` fires after the whole review.
output:
  from: synth
