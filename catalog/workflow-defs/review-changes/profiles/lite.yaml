version: 1

# Lite review: correctness only — ONE patch narrowing the expand template's `over`
# list (lists replace wholesale on merge). The security/performance siblings are
# simply never generated, and collect's inputs_each fan-in follows the narrowed
# list automatically — no node removal, no collect rewiring, no dangling refs. The
# surviving review_correctness keeps phase_group: review.
nodes:
  patch:
    - id: review
      expand:
        over: [correctness]
