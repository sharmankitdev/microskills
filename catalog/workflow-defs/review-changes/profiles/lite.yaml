version: 1

# Lite review: correctness only. Removes the security + performance dimension nodes and
# unwires them from `collect` — leaving the dangling `${review_security.output}` /
# `${review_performance.output}` refs would orphan-block validation, so the patch deletes
# those input keys (overlay null = delete) and narrows collect's depends_on. The surviving
# review_correctness keeps phase_group: review, so it shows under the "review" group.
nodes:
  remove: [review_security, review_performance]
  patch:
    - id: collect
      depends_on: [review_correctness]
      inputs:
        security: null
        performance: null
