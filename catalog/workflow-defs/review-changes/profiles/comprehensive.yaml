version: 1

# Comprehensive review: every dimension a thorough code verification needs — base's
# correctness / security / performance PLUS style, documentation, and test-coverage.
# ONE patch on the expand template's `over` list (lists replace wholesale on merge);
# the generated review_* siblings, their phase_group: review grouping, and collect's
# fan-in inputs/depends_on all follow from the expansion — no collect rewiring.
# Per-item variation rides as map extras in the over entry: test-coverage threads an
# optional `min_coverage` input (acceptable coverage %, default 80) in as its
# `threshold`.
inputs:
  min_coverage:
    type: integer
    required: false
    default: 80

nodes:
  patch:
    - id: review
      expand:
        over:
          - correctness
          - security
          - performance
          - style
          - documentation
          - item: test-coverage
            inputs:
              threshold: ${workflow.inputs.min_coverage}
