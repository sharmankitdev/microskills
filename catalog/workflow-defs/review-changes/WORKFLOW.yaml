version: 1
name: review-changes
description: Review a unified git diff end to end — summarize, review across correctness/security/performance, collect, adversarially verify, and synthesize a prioritized report, with an approval gate that can post it to a PR/MR.

# Caller-supplied inputs (referenced as ${workflow.inputs.<name>}).
inputs:
  diff_path:
    type: string
    required: true
    materialize: file
    description: >-
      The unified git diff to review. Each consuming microskill (summarize-diff,
      review-dimension, verify-finding) Reads the path.
  context:
    type: string
    required: false
    description: Optional free-text grounding material (PR/change description, spec excerpt) forwarded to summarize-diff to ground the intent overview.

# Advisory only — documents the reused microskills; no runtime effect (no workflow: nodes here).
imports:
  - microskills/summarize-diff
  - microskills/review-dimension
  - microskills/collect-findings
  - microskills/verify-finding
  - microskills/synthesize-review

# This is a REUSABLE COMPONENT: it produces the review and ENDS at `synthesize`. The
# terminal human action (decide what to do with the report, post it to a PR/MR) is a
# SEPARATE concern owned by whatever workflow incorporates this one — see the "caller owns
# the terminal decision" skeleton in DAG-RULES.md §14. Invoked on its own, the dispatcher's
# Finish step presents the synthesized report to the user.
#
# No gate, no orchestrator node, no loop, so it composes cleanly when nested (run
# `compile-workflow review-changes --annotate` for the generated partition sidecar). The
# dimension reviews all depend only on `summarize`, so they share a dependency rank and the
# compiler emits them as ONE concurrent parallel([...]) batch — they run at the same time,
# not serially (see DAG-RULES.md §12, Intra-segment parallelism). They share
# `phase_group: review`, so they render under one "review" group in the /workflows window.
nodes:
  # Summarize the diff into a structured, file-grouped summary that grounds every
  # downstream review. Whole summary object is reused as change_summary by each dimension
  # review and by the synthesis. Node output shape: the resolved summarize-diff
  # output_schema (inherited).
  - id: summarize
    use: summarize-diff
    depends_on: []
    inputs:
      diff_path: ${workflow.inputs.diff_path}
      context: ${workflow.inputs.context}

  # The dimension reviews — ONE expand TEMPLATE, statically fanned out at compile
  # time into a concrete `review_<dimension>` sibling per over entry (review_correctness,
  # review_security, review_performance). {{each.item}} resolves to the dimension name, so
  # each generated node runs review-dimension under that dimension's profile (the
  # `correctness` overlay is an empty alias of base, which already ships
  # dimension=correctness). The generated siblings all depend only on `summarize` (the
  # ${summarize.output} ref implies the edge), so they share a dependency rank and compile
  # into ONE concurrent parallel([...]) batch; they share phase_group: review, so they
  # render under one "review" group. A profile overlay customizes the fan-out by patching
  # this template's `over` list ONLY (see comprehensive.yaml / lite.yaml) — `collect` below
  # fans in via inputs_each, so no collect rewiring is ever needed.
  - id: review
    use: review-dimension
    customize: { profile: "{{each.item}}" }
    phase_group: review
    expand:
      over: [correctness, security, performance]
    inputs:
      # The microskill's generalized input is artifact_path ({{artifact_kind}} =
      # unified git diff in every code dimension profile); this workflow's public
      # input stays diff_path.
      artifact_path: ${workflow.inputs.diff_path}
      change_summary: ${summarize.output}

  # Fan the sibling dimension results into one combined, dimension-stamped,
  # globally-identified, deduplicated list. inputs_each desugars to one
  # `<dimension>: ${review_<dimension>.output}` input plus an explicit depends_on edge
  # per over entry, so the fan-in tracks the template's over list automatically.
  - id: collect
    use: collect-findings
    inputs_each: review

  # Adversarially verify each collected finding against the diff. Fan-out via for_each
  # over the collected findings, bounded by max_parallel; lands in a background segment so the
  # batch cap is honored. The per-item verdicts are consumed downstream as the whole array via
  # ${verify.items}.
  - id: verify
    use: verify-finding
    for_each: ${collect.output.findings}
    as: finding
    max_parallel: 4
    inputs:
      finding: ${finding}
      artifact_path: ${workflow.inputs.diff_path}

  # Synthesize the verified findings into one prioritized report. Consumes the
  # summarize-diff summary, the collected findings, and the per-finding verify-finding verdicts
  # (the whole fan-out array via ${verify.items}). This node's result is the workflow output.
  - id: synthesize
    use: synthesize-review
    inputs:
      change_summary: ${summarize.output}
      findings: ${collect.output.findings}
      verifications: ${verify.items}

# The workflow output IS the synthesized review. Its verdict / blocker_count / report_markdown /
# findings form the output contract a caller consumes — the caller decides whether to post it,
# loop on it, or present it. This component never posts or pauses for a human itself.
output:
  from: synthesize
