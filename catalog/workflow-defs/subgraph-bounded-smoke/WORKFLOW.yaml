version: 1
name: subgraph-bounded-smoke
description: >-
  Smoke def for the `subgraph:` primitive's BOUNDED convergence — splices the minimal
  review-converge subgraph so the local do/while is exercised end to end over the REAL catalog
  registry (the CI closure-drift + full-registry-validate gates compile/validate this def every
  run, golden-locking the bounded emit). Not base-tagged: it is a regression anchor, never
  seeded into a consumer's harness.yaml.

# Splices the bounded subgraph at <defs-root>/_subgraphs/review-converge/SUBGRAPH.yaml
# (resolved by name at compile time — the `subgraph: <name>` node IS the reference).
#
# author -> [subgraph rev (bounded)] -> publish. The subgraph node carries ONLY
# id/subgraph/with/inputs; it desugars in place into rev__review + rev__synthesize, wrapped in
# a `do { ... } while ((!converged) && iter < 3)` LOCAL to the host background segment, so the
# whole def collapses into ONE background segment (the in-segment promise of the primitive —
# bounded convergence never adds a checkpoint). The downstream ${rev.output.report} ref
# re-points at the subgraph's exit (rev__synthesize).
nodes:
  - id: author
    agent: writer
    prompt: >-
      Draft a short high-level design document, write it to a file, and return its path as
      document_path.
    output_schema:
      type: object
      required: [document_path]
      properties:
        document_path: { type: string }

  - id: rev
    subgraph: review-converge
    with:
      artifact_kind: high-level design document
    inputs:
      artifact_path: ${author.output.document_path}

  # The ${rev.output.report} ref re-points at the subgraph exit (rev__synthesize) and implies
  # the ordering edge, so no depends_on is needed.
  - id: publish
    agent: publisher
    prompt: >-
      Publish the synthesized report found at ${rev.output.report}.
