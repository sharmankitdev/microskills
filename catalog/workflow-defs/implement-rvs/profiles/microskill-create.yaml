version: 1
# implement-rvs / microskill-create — retarget the workflow-domain RVS (baked in WORKFLOW.yaml)
# to the MICROSKILL domain: the implementer + floor switch to the ms validators, the review panel
# swaps the 7 wf dimensions for the 11 ms dimensions, and verify switches to the ms combined
# adversarial seat (it fans out over both panels via ${[review[].findings, xreview[].findings].flat()}
# — no collect fan-in node). The xreview cross panel + synth (create-impl-rvs) are domain-neutral and
# stay. A profile that swaps review.expand.over MUST co-patch loop.body to the new generated
# review_ms_* ids (the resolver list-replaces both).
nodes:
  patch:
    # Implement + floor → the microskill domain validators.
    - id: implement
      customize: { profile: microskill }
    - id: floor
      customize: { profile: microskill }
    # Review panel → the 11 artifact-stage microskill dimensions (expand.over REPLACES wholesale).
    # shape-not-faithfulness-fabrication-passes + additionalprops-and-empty-content-permissive are
    # the two adversarial guard lenses (hollow-but-valid steps / vacuous-but-present content): both
    # authored + tested-to-resolve, now WIRED — ms-purpose-contract-fidelity + the shape lens each
    # disclaim them, so the disclaimers reference live siblings rather than dangling.
    - id: review
      expand:
        over:
          - ms-atomicity-single-purpose
          - ms-orchestration-leak
          - ms-inputs-contract-adequacy
          - ms-output-contract-appropriate
          - ms-failure-modes-coverage
          - ms-output-section-vs-schema-fields
          - ms-input-step-wiring-coherence
          - ms-purpose-contract-fidelity
          - ms-description-trigger-quality
          - shape-not-faithfulness-fabrication-passes
          - additionalprops-and-empty-content-permissive
    # Verify → the ms combined adversarial seat (microskill draft bundle + catalog index).
    - id: verify
      customize: { profile: microskill-draft-xref }

# Co-patch loop.body to the GENERATED review_ms_* ids (replaces the wf body wholesale). The cross
# xreview ids + the fixed pipeline ids are unchanged. No collect node — verify reads both panels
# via ${[review[].findings, xreview[].findings].flat()}.
loop:
  body: [implement, catalog_index, bundle, bundle_xref, floor,
         review_ms_atomicity_single_purpose, review_ms_orchestration_leak,
         review_ms_inputs_contract_adequacy,
         review_ms_output_contract_appropriate, review_ms_failure_modes_coverage,
         review_ms_output_section_vs_schema_fields, review_ms_input_step_wiring_coherence,
         review_ms_purpose_contract_fidelity,
         review_ms_description_trigger_quality,
         review_shape_not_faithfulness_fabrication_passes,
         review_additionalprops_and_empty_content_permissive,
         xreview_duplicate_capability, xreview_naming_collision, xreview_reverse_consumer,
         verify, synth]
