version: 1

# Autonomous overlay — unattended / nested runs. The rigor blocks (critic panel, convergence
# loop, closure refute-vote, tally, evidence ledger) are BASE-GRAPH nodes and run identically
# here — this overlay touches ONLY the gate mode and the two AskUserQuestion interaction
# prompts (clarify, present_refined). It adds nothing, removes nothing, weakens nothing.
#
# Headless behavior this buys: approve_requirements takes its declared default (approve,
# recorded verbatim); the synthetic loop_exhaust gate has on_headless: fail → an unconverged
# critique loop PARKS the run, pickup-able (never silent degradation); a red closure tally
# still stops at triage_reopened (its prompt requires AskUserQuestion and is deliberately
# NOT patched — a quality floor, not an interaction nicety).
gate_mode: auto
nodes:
  patch:
    # One unattended infer-from-sources pass (no human to ask). Unfillable gaps stay as
    # explicit "Open question for human review:" lines — which the req-* critic rubrics
    # count as blocker/major findings, so they surface downstream, never vanish.
    - id: clarify
      prompt: >
        Refine the assembled requirements document at ${assemble.output.document_path} UNATTENDED —
        there is NO human, so you MUST NOT call AskUserQuestion. It has ${assemble.output.gaps_count}
        open gap(s): ${assemble.output.gaps}. Fill a gap ONLY when its answer is unambiguously
        inferable from the sources at ${workflow.inputs.sources_path} or a safe documented default;
        record what you inferred and why. For every gap you cannot fill confidently, leave that
        section's content as an explicit "Open question for human review:" line quoting the gap's
        question. Write the confidently-inferred answers to a ledger at
        ${workflow.inputs.staging_dir}/answers.json and re-invoke /assimilate-requirements ONCE with
        prior_answers_path set to that ledger to rewrite the document and re-emit gaps. Do exactly ONE
        pass (no rounds — there is no one to ask). Do NOT present the document — an adversarial
        critique loop, a closure refute-vote, and an approval gate run downstream. RETURN
        {choice: "auto-accepted", final_document_path, rounds: 1, converged: <true only when the
        re-emitted gaps_count is 0>, remaining_gaps}.
    # Unattended pass-through for the post-rigor document review (an interaction node, not a
    # quality floor — the sanctioned prompt-patch target).
    - id: present_refined
      prompt: >
        UNATTENDED — do NOT call AskUserQuestion. Verify the refined document exists at
        ${assemble.output.document_path} and the critique report at
        ${synth_req.output.report_path}. RETURN {action: "auto-accepted",
        document_path: ${assemble.output.document_path}, remediation_rounds: 0}.
  # NOTE: triage_reopened is NEVER patched here (red-floor park stays honest), and the old
  # `approve` patch is gone with the removed base node (patching a removed id is a
  # list-verb error).
