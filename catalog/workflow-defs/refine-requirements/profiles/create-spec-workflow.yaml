version: 1

# create-spec-workflow — the interactive intent front-end for workflow-create
# (§8 step 6 / D3). Retargets the critique panel to the 3 workflow-spec lenses
# (coverage / control-flow / data-flow), threads the 8-section workflow spec template,
# sets the loop/clarify/refute budgets to the wider workflow scope, and collapses the
# approval gate (severity:warn). clarify + present_refined stay INTERACTIVE. NO
# output_schema / parent-input changes.
inputs:
  template_path:
    default: .claude/workflow-defs/refine-requirements/references/workflow-spec-template.md
  max_iterations:
    default: 3          # clarify-loop cap (wider workflow scope; symmetry with loop.max_iters)
  refute_seats:
    default: 3          # odd; full majority-vote closure refute for the larger wf spec

nodes:
  patch:
    - id: critique
      expand:
        over:
          - { item: spec-wf-coverage, name: "Goal→node coverage" }
          - { item: spec-wf-controlflow, name: "Control-flow specification" }
          - { item: spec-wf-dataflow, name: "Data-flow & IO coherence" }
    - id: collect_req
      customize: { profile: spec-wf-create }

loop:
  max_iters: 3
  body: [revise_req, critique_spec_wf_coverage, critique_spec_wf_controlflow,
         critique_spec_wf_dataflow, collect_req, synth_req]

gates:
  patch:
    - id: approve_requirements
      severity: warn
