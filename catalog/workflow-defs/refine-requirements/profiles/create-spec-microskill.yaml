version: 1

# create-spec-microskill — the interactive intent front-end for microskill-create
# (§8 step 6 / D3). Retargets refine-requirements' completeness critique panel from the
# generic SE-requirements lenses (req-*) to the 2 microskill-spec lenses, threads the
# 7-section microskill spec template, tightens the loop/clarify/refute budgets to the
# tighter microskill scope, and KEEPS the approval gate HARD (severity:hard) — when this
# profile is inlined as microskill-create's refine front-end (2026-06-21 rewire, sub-PR 3),
# approve_requirements becomes Gate 1, a HARD parent-level checkpoint. The create pipeline
# therefore runs TWO hard human gates: requirements (Gate 1, this gate) + plan (Gate 2,
# the host's approve_plan). clarify + present_refined stay INTERACTIVE here (intent capture
# is the whole point of the front-end). NO output_schema / parent-input changes →
# develop-product-backlog's external contract is untouched.
inputs:
  template_path:
    default: .claude/workflow-defs/refine-requirements/references/microskill-spec-template.md
  max_iterations:
    default: 2          # clarify-loop cap (tight microskill scope)
  refute_seats:
    default: 1          # odd; single-judge closure refute for the small ms spec

nodes:
  patch:
    # Replace the 4 req-* critique lenses with the 2 microskill-spec lenses. The
    # expand.over list REPLACES wholesale (resolver list-replace), so compile generates
    # exactly critique_spec_ms_completeness + critique_spec_ms_atomicity.
    - id: critique
      expand:
        over:
          - { item: spec-ms-completeness, name: "Microskill spec completeness" }
          - { item: spec-ms-atomicity, name: "Atomicity & single-linear-path" }
    # Re-point the fan-in to the collect profile that registers the 2 new lens keys.
    - id: collect_req
      customize: { profile: spec-ms-create }

# Co-patch loop.body to the NEW generated critique ids (WORKFLOW.yaml lines 369-373
# mandate this whenever critique.over changes) + tighten the convergence cap.
loop:
  max_iters: 2
  body: [revise_req, critique_spec_ms_completeness, critique_spec_ms_atomicity,
         collect_req, synth_req]

# Gate 1 kept HARD: inlined into microskill-create, approve_requirements is the
# requirements checkpoint the human signs off (with critic evidence) before any planning —
# the first of the create pipeline's two hard gates (requirements + plan).
gates:
  patch:
    - id: approve_requirements
      severity: hard
