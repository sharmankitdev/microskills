version: 1

# create-spec-workflow-auto — unattended variant of create-spec-workflow (§8 step 6 / D3).
# Full create-spec-workflow body PLUS gate_mode:auto and the unattended clarify/present_refined
# prompts. triage_reopened deliberately NOT patched (honest red-floor park).
gate_mode: auto

inputs:
  template_path:
    default: .claude/workflow-defs/refine-requirements/references/workflow-spec-template.md
  max_iterations:
    default: 3
  refute_seats:
    default: 3

nodes:
  patch:
    - id: critique
      expand:
        over:
          - { item: spec-wf-coverage, name: "Goal→node coverage" }
          - { item: spec-wf-controlflow, name: "Control-flow specification" }
          - { item: spec-wf-dataflow, name: "Data-flow & IO coherence" }
    - id: collect_req
      customize: { profile: spec-wf-create }
    - id: clarify
      prompt: >
        Refine the assembled workflow specification at ${assemble.output.document_path}
        UNATTENDED — there is NO human, so you MUST NOT call AskUserQuestion. It has
        ${assemble.output.gaps_count} open gap(s): ${assemble.output.gaps}. Fill a gap ONLY
        when its answer is unambiguously inferable from the sources at
        ${workflow.inputs.sources_path} or a safe documented default; record what you
        inferred and why. For every gap you cannot fill confidently, leave that section's
        content as an explicit "Open question for human review:" line quoting the gap's
        question. Write the confidently-inferred answers to a ledger at
        ${workflow.inputs.staging_dir}/answers.json and re-invoke /assimilate-requirements
        ONCE with prior_answers_path set to that ledger to rewrite the document and re-emit
        gaps. Do exactly ONE pass (no rounds — there is no one to ask). Do NOT present the
        document — an adversarial critique loop, a closure refute-vote, and an approval gate
        run downstream. RETURN {choice: "auto-accepted", final_document_path, rounds: 1,
        converged: <true only when the re-emitted gaps_count is 0>, remaining_gaps}.
    - id: present_refined
      prompt: >
        UNATTENDED — do NOT call AskUserQuestion. Verify the refined specification exists at
        ${assemble.output.document_path} and the critique report at
        ${synth_req.output.report_path}. RETURN {action: "auto-accepted",
        document_path: ${assemble.output.document_path}, remediation_rounds: 0}.

loop:
  max_iters: 3
  body: [revise_req, critique_spec_wf_coverage, critique_spec_wf_controlflow,
         critique_spec_wf_dataflow, collect_req, synth_req]

gates:
  patch:
    - id: approve_requirements
      severity: warn
