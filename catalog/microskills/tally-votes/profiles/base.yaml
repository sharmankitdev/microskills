version: 1
inputs:
  verdicts:
    required: true
  assignment:
    required: true
  report_path:
    required: true
output_schema:
  type: object
  required:
    - verdict
    - upheld
    - refuted
    - needs_human
    - upheld_count
    - refuted_count
    - needs_human_count
    - attention_count
    - blocker_count
    - group_count
    - pair_count
    - verdicts_received
    - seats
    - report_path
    - summary
  properties:
    verdict:
      type: string
      enum: [approve, comment, request_changes]
    upheld:
      type: array
    refuted:
      type: array
    needs_human:
      type: array
    upheld_count: { type: integer }
    refuted_count: { type: integer }
    needs_human_count: { type: integer }
    attention_count: { type: integer }
    blocker_count: { type: integer }
    group_count: { type: integer }
    pair_count: { type: integer }
    verdicts_received: { type: integer }
    seats:
      type: array
    report_path: { type: string }
    summary: { type: string }
