version: 1

# wireframe-revise overlay for author-design-artifact (ux-design stage, §3.2).
# Swaps only the design-contract var. output_schema is deliberately NOT
# declared: the stated contract {document_path, summary} is exactly base's
# schema, so the overlay inherits it (only keys that change vs base appear).
vars:
  design_contract: >-
    wireframe-revise contract: revise the wireframes document IN PLACE — read
    the current document at primary_path and write the revision to the stable
    path <output_dir>/ux/wireframes.md (the first revision pass reads the
    winning candidate under <output_dir>/ux/candidates/ and lands it at the
    stable path; every later pass reads and rewrites the stable path itself,
    keeping downstream refs truthful). Reconcile every screen against the
    journeys document at context_path: keep each screen's journey_refs
    current, and keep every journey's screen path complete. Fold in the
    supplied direction sources, null = nothing for that source:
    revision_notes = freeform direction to apply across the document;
    graft_notes = runner-up candidates' strengths to graft into the winning
    layout; known_findings = structured review findings — resolve every entry
    in its cited screen or section and note the resolution inline. Preserve
    the document's structure (one section per screen with a fenced lo-fi
    sketch, journey_refs, and a navigation note) and the established layout
    stance — refine it, never replace it.
