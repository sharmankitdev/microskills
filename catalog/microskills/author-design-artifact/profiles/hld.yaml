version: 1

# hld overlay for author-design-artifact (technical-design stage, §3.2).
# Swaps the design-contract var and REPLACES output_schema wholesale: the
# components array is the downstream LLD fan-out driver (one for_each item per
# component), so the schema must guarantee its shape.
vars:
  design_contract: >-
    hld contract: synthesize THE canonical high-level design at
    <output_dir>/design/hld.md IN PLACE (every revision round rewrites the
    same path, keeping downstream refs truthful) from the winning candidate
    design at primary_path. Graft the supplied graft_notes — the runner-up
    candidates' strengths from the judge panel — into the winning architecture
    at the points they strengthen it, without diluting its stance. Ground
    every decision in the requirements document at context_path: carry the
    candidate's components-and-responsibilities, technology-stack, data-flows,
    integration-points, and NFR-coverage sections forward, hardened and
    completed for the full requirements scope. Classification-aware: a
    non-null classification object = confirm its product_kind and has_ui
    claims and keep the design consistent with them, recording any
    contradiction explicitly in the document; a null classification = infer
    product kind and UI surface from the requirements. Revision sources, null
    = nothing to fold: a non-null prior_findings_path names the previous
    review round's findings report — resolve every blocker and major finding
    in its cited section; revision_notes = standing human guidance to honor
    throughout. A non-null ux object supplies the UX surface — Read the
    wireframes document its wireframes_path field names. Enumerate the final
    component list, one entry per component carrying name and a one-line
    responsibility, as the returned components array, with components_count
    equal to its length.

# REPLACES base {document_path, summary} wholesale. components [{name,
# responsibility}] drives the per-component LLD for_each; components_count is
# the coverage cross-check tally.
output_schema:
  type: object
  required: [document_path, components, components_count, summary]
  properties:
    document_path: { type: string }
    components:
      type: array
      minItems: 1
      # Scale guard for the downstream per-component LLD fan-out (and its 3-dim
      # review cross-product): an HLD that genuinely needs more than 12 top-level
      # components should be split into subsystems, not fanned out unboundedly.
      maxItems: 12
      items:
        type: object
        required: [name, responsibility]
        properties:
          name: { type: string }
          responsibility: { type: string }
    components_count: { type: integer }
    summary: { type: string }
