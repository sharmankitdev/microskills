version: 1

# wireframe-candidate overlay for author-design-artifact (ux-design stage,
# §3.2 — emits the lens under the canonical field `label`). Swaps the
# design-contract var, flips `label` (the layout-lens name the schema echoes)
# from optional to required, and REPLACES output_schema wholesale so the
# expand-generated candidate siblings emit {document_path, label, summary}
# entries collect-artifacts (profile ux-candidates) fans in.
vars:
  design_contract: >-
    wireframe-candidate contract: generate a COMPLETE lo-fi wireframes document
    at <output_dir>/ux/candidates/<label>.md from the journeys document at
    primary_path, committed wholly to the layout stance named by the required
    label (task-flow = one focused linear screen path per journey;
    hub-dashboard = a central overview hub radiating out to task screens;
    progressive-wizard = staged step-by-step disclosure of each task) — the
    label text itself is the stance directive. Sketch one screen section per
    entry in the supplied screens list: a non-null ux object's screens array
    names the list; a null ux = the screen inventory of the journeys document
    at primary_path names it. Each screen section carries the screen name as
    its heading, its journey_refs (the journeys passing through it), a fenced
    ASCII/markdown lo-fi sketch (boxes for layout regions, labeled controls,
    placeholder content — structure and hierarchy only, no visual styling),
    and a navigation note naming the screens reachable from it. Coverage is
    mandatory: every journey traces a complete screen path through the
    sketches. A non-null stance value adds supplementary angle guidance folded
    into the layout decisions; the requirements document at context_path
    grounds content and constraints. Echo the supplied label verbatim in the
    returned label field.

# The label flip makes the lens name a gathered input — the candidate schema
# and the judge scorecards key on it, so it cannot ride as an optional null.
inputs:
  label:
    required: true

# REPLACES base {document_path, summary} wholesale: label is the join key the
# collect/judge/synthesize-panel chain ranks candidates by.
output_schema:
  type: object
  required: [document_path, label, summary]
  properties:
    document_path: { type: string }
    label: { type: string }
    summary: { type: string }
