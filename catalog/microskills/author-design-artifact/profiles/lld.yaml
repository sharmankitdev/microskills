version: 1

# lld overlay for author-design-artifact (technical-design stage, §3.2).
# Swaps the design-contract var, flips `focus` (the one component this LLD
# details) from optional to required, and REPLACES output_schema wholesale so
# the per-component fan-out items carry the component_name join key.
vars:
  design_contract: >-
    lld contract: author the low-level design for exactly ONE component — the
    component named by the required focus input — at the deterministic path
    <output_dir>/design/lld/<focus-slug>.md (focus lowercased,
    non-alphanumeric runs collapsed to single hyphens). The primary artifact
    at primary_path is the approved HLD, the contract source: stay inside the
    named component's declared responsibility, integration points, and
    technology choices — never redesign a neighboring component. The
    requirements document at context_path grounds the functional and
    non-functional detail. Required sections: (1) Module breakdown — the
    component's internal modules with one-line responsibilities;
    (2) API contracts — every interface the component exposes and consumes,
    with signatures or endpoints, request/response shapes, and error codes;
    (3) Data models — entities, fields, types, relationships, and persistence
    notes; (4) Key sequences — stepwise flows for the principal operations,
    as markdown sequence sketches; (5) Error handling — failure modes, error
    propagation, timeout and recovery policy, and user-visible error
    behavior. A non-null ux object supplies UX constraints — Read the
    wireframes document its wireframes_path field names; a null ux = no UX
    surface for this component. Return component_name as the focus value
    exactly as the HLD names it.

# The focus flip makes the component name a gathered input — one LLD per HLD
# component is the coverage contract, so it cannot ride as an optional null.
inputs:
  focus:
    required: true

# REPLACES base {document_path, summary} wholesale: component_name is the key
# the cross-product LLD reviews and the coverage check join on.
output_schema:
  type: object
  required: [document_path, component_name, summary]
  properties:
    document_path: { type: string }
    component_name: { type: string }
    summary: { type: string }
