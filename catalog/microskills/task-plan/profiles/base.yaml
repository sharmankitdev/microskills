version: 1

# Default domain = microskill creation. The `workflow` overlay overrides the
# contract doc, executor agent, and output_schema for the workflow domain.
vars:
  contract_doc: .claude/workflow-defs/microskill-create/references/planner.md

# `requirement_path` is passed by reference (`materialize: file`; the body Reads it).
# No allowed_tools confinement here — the planner Reads the contract/requirement AND
# Writes the plan file, so it must stay tool-unrestricted.
inputs:
  requirement_path:
    required: true
    materialize: file
  staging_dir:
    required: true
  # Optional re-plan input (plan-rvs bounded variant): the prior round's review
  # findings. Round 1 carries null → a fresh plan; later rounds re-plan to address
  # each finding (mirrors task-implement's last_findings — declared in the MICROSKILL.md
  # inputs table; optional, so no required/materialize metadata is needed here).

# Executor identity for workflow use: nodes — run AS this agent on this model
# (background segments can't nest-dispatch, so the executor IS the planner).
runtime:
  agent: microskill-planner
  model: opus

# Default plan-output contract (microskill-domain shape). A profile overlay may
# override this wholesale — the resolver REPLACES output_schema across layers.
# This resolved schema is what a use: node INHERITS (callers no longer restate
# it inline), so it must carry every field a caller references.
output_schema:
  type: object
  required: [plan_path, scope_advisory]
  properties:
    plan_path: { type: ["string", "null"], description: Path to the written plan YAML file under staging_dir, or null when a scope advisory applies. }
    name: { type: ["string", "null"], description: Proposed kebab-case name for the artifact (echoes name_override when supplied). }
    scope_advisory: { type: ["object", "null"] }
    # Microskill domain has no missing-microskill concept; declared null-safe (NOT required)
    # so that plan-rvs's domain-neutral synth can reference ${plan.output.missing_microskills}
    # under the ms profiles too — the ms planner emits null/absent. The workflow profile
    # overrides output_schema wholesale and re-declares this field as a populated array.
    missing_microskills: { type: ["array", "null"], description: Always null/absent in the microskill domain (no nested-component provisioning); present only as a null-safe echo target for the shared plan-rvs synth. }
