version: 1
# Microskill-draft COMBINED adversarial-verify overlay for verify-finding — the ms twin of
# workflow-draft-xref (sub-PR 4, for implement-rvs's microskill-create profile). The
# host-inline RVS runs ONE verify fan-out over the UNION of the microskill-draft findings
# (need the draft bundle) and the cross-artifact findings (need the catalog index), so the
# seat reads the draft bundle AND the frozen catalog-index.json, concatenated, as the single
# artifact_path — covering both finding kinds and keeping the cross refute reproducible
# (verify reads the same index the cross panel saw). verify-finding has no context_path slot,
# so the index rides inside artifact_path (mirrors verify-finding/profiles/cross-artifact.yaml).
# Var-only: inputs (finding + artifact_path materialize:file + seat), runtime, and
# output_schema inherit from base.
vars:
  artifact_kind: microskill draft bundle (MICROSKILL.md + profiles/*.yaml, concatenated) followed by the catalog index (catalog-index.json), concatenated
