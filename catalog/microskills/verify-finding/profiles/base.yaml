version: 1
# `artifact_kind` names WHAT the finding cites. Substituted as {{artifact_kind}}
# in the inputs table and the read step. Base = the code-review diff; a
# document-review profile (e.g. `document`) overrides it.
vars:
  artifact_kind: unified git diff
# `artifact_path` is passed by reference (`materialize: file`; the body Reads
# it) — critical here because verify-finding fans out per finding, so an inline
# artifact would be duplicated into every parallel call. `seat` is optional with
# a null default (single-judge mode), so it needs no entry.
inputs:
  finding:
    required: true
  artifact_path:
    required: true
    materialize: file
# The body Reads the artifact file at artifact_path, so Read must be allowlisted.
runtime:
  allowed_tools: [Read]
output_schema:
  type: object
  required: [finding_id, verdict, rationale, adjusted_severity, false_positive]
  properties:
    finding_id: { type: string }
    verdict: { type: string, enum: [confirmed, refuted, needs_human] }
    rationale: { type: string }
    adjusted_severity: { type: [string, "null"] }
    false_positive: { type: boolean }
