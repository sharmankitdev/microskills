version: 1
# `diff_path` carries the diff BY REFERENCE: `materialize: file` tells the
# dispatcher to normalize the caller's string/file/dir into one canonical file and
# supply only the short path (the body Reads it), dodging args-size truncation —
# critical here because verify-finding fans out per finding, so an inline diff
# would be duplicated into every parallel call.
inputs:
  finding:
    required: true
  diff_path:
    required: true
    materialize: file
# The body Reads the diff file at diff_path, so Read must be allowlisted.
runtime:
  allowed_tools: [Read]
output_schema:
  type: object
  required: [finding_id, verdict, rationale, adjusted_severity, false_positive]
  properties:
    finding_id: { type: string }
    verdict: { type: string, enum: [confirmed, refuted, needs_human] }
    rationale: { type: string }
    adjusted_severity: { type: [string, "null"] }
    false_positive: { type: boolean }
