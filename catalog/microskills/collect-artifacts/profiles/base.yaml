version: 1

# Every artifact-entry input (artifact_1, artifact_2, artifact_3) is optional
# with a null default, so no inputs.<name>.required and no inputs.<name>.default
# lines are emitted. This is a pure in-memory fan-in transformation that writes
# nothing to disk and runs no domain agent, so — matching its named twin
# collect-findings and the sibling fan-in microskills — no runtime section is
# declared.
output_schema:
  type: object
  required: [candidates, candidate_count]
  properties:
    candidates:
      type: array
      items:
        type: object
    candidate_count:
      type: integer
