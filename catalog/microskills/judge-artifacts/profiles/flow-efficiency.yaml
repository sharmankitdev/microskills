version: 1

# flow-efficiency lens overlay for judge-artifacts (minted per MULTIAGENTIC-DESIGN §3.2).
# Swaps ONLY vars.judge_lens — inputs, runtime, output_schema, and the body
# inherit from base: the SAME body scores candidates under this lens.
vars:
  judge_lens: >-
    how few steps, screens, and context switches the candidate's flows
    need to complete the grounded tasks — the primary task's happy path is
    minimal; frequent tasks are reachable fast; data the system already holds
    is never re-asked; error and edge flows return the user to the main path
    cheaply. Score high for short happy paths, fast frequent-task access, and
    cheap recovery; score low for redundant steps, re-entered data, and flows
    that strand the user after an error.
