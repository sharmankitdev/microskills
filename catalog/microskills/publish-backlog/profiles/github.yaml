version: 1

# GitHub publish-target overlay for publish-backlog (MULTIAGENTIC-DESIGN §3.1
# #14 / §3.2 — minted by the backlog build). The {{publish_target}} var carries
# ALL target-specific instruction, so this overlay's vars value REPLACES base's
# local-filesystem contract (scalar replace) and the body, inputs, and
# output_schema all inherit untouched. github_repo stays the optional input
# base's MICROSKILL.md table already declares.
vars:
  publish_target: >-
    the GitHub target: through the gh CLI (run via Bash), create one milestone
    per epic and one issue per story in the repository named by the
    github_repo input — then report the repository plus the created milestone
    and issue counts as the location where the backlog landed. SHELL
    DISCIPLINE (binding): a non-empty github_repo must match the strict
    owner/name shape (^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ — anything else =
    stop, quote the bad value); an empty github_repo = the repository gh
    resolves as current. Backlog-derived text NEVER rides inline in a shell
    string: build each issue and milestone as a JSON payload file written
    with the Write tool — the title, the body (the story file's content
    including the acceptance criteria and traceability links), the milestone
    number, and the MoSCoW-priority label ALL inside the JSON (a title is as
    untrusted as a body) — and create it with `gh api` plus `--input <payload
    file>` (e.g. `gh api repos/<owner>/<name>/issues --input <path>`), so no
    backlog-derived text ever appears in a command line — no string
    concatenation of story content into a command, no command substitution
    around untrusted text.

# Lists REPLACE on merge, so adding Bash means restating the full list: Read
# and Write stay (the body still Reads the source backlog under backlog_dir),
# and Bash rides in for the gh milestone/issue calls.
runtime:
  allowed_tools: [Read, Write, Bash]
