version: 1

inputs:
  skill_path:
    required: true

output_schema:
  type: object
  required: [decomposition_requirement, responsibilities]
  properties:
    decomposition_requirement:
      type: string
      description: >
        Self-contained natural-language requirement a workflow planner can consume to
        rebuild the monolith as a microskill DAG. Instructs the planner to define a
        microskill only for each atomic_core, realize non-atomic responsibilities as
        workflow constructs, place hoisted concerns on the wrapping node/loop/gate, and
        provision missing agent_dependencies.
    responsibilities:
      type: array
      description: >
        Discrete responsibilities extracted from the monolith, each classified by
        control-flow shape and routed to a target form. Only target=microskill entries
        are meant to become microskills.
      items:
        type: object
        required: [name, purpose, shape, target]
        properties:
          name: { type: string }
          purpose: { type: string }
          shape:
            type: string
            enum: [atomic, conditional, iterative, fan_out, interactive]
            description: Control-flow shape read off the control-flow map.
          target:
            type: string
            enum: [microskill, orchestrator_node, gate, loop, nested_workflow]
            description: The workflow construct this responsibility should become.
          atomic_core:
            type: string
            description: >
              For target=microskill, the single straight-line action from inputs to one
              output, stripped of every cross-cutting concern. Empty for non-microskill targets.
          hoisted_concerns:
            type: array
            description: Cross-cutting orchestration pushed to the workflow layer, each with the owning construct.
            items:
              type: object
              required: [concern, owner]
              properties:
                concern: { type: string, description: "e.g. single-retry, report-and-ask, mcp-fallback, partial-entry-hydration, mode-branch." }
                owner: { type: string, description: The workflow node/loop/gate that owns this concern. }
    control_flow:
      type: object
      description: Ordering and conditional/iterative/fan-out/checkpoint structure implied by the monolith's instructions.
      properties:
        ordering:
          type: array
          items: { type: string }
        branches: { type: array }
        loops: { type: array }
        fan_out: { type: array }
        gates: { type: array }
    data_flow:
      type: array
      description: Per-step data dependencies — what each step consumes and produces.
      items:
        type: object
        required: [step]
        properties:
          step: { type: string }
          consumes: { type: array }
          produces: { type: array }
    agent_dependencies:
      type: array
      description: Sub-agents the rebuilt workflow will depend on, with usage and existence.
      items:
        type: object
        required: [name, exists]
        properties:
          name: { type: string }
          used_by: { type: string, description: The responsibility/node that spawns this agent. }
          exists: { type: boolean, description: Whether the agent currently exists under .claude/agents/. }
    nested_workflows:
      type: array
      description: >
        Sub-pipelines (target=nested_workflow) the rebuilt workflow invokes from an
        orchestrator node at runtime. A missing one (exists=false) is built via
        workflow-create before its node; an existing one (exists=true) is invoked as-is.
      items:
        type: object
        required: [name, exists]
        properties:
          name: { type: string }
          requirement: { type: string, description: For exists=false, a self-contained requirement workflow-create can build into a workflow. Empty when exists=true. }
          exists: { type: boolean, description: Whether the sub-pipeline already exists as an invokable skill/command/workflow. }
          invoke_target: { type: string, description: The skill/command/workflow name the parent's orchestrator node invokes at runtime. }
