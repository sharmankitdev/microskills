version: 1

# Structured output contract — lets this skill compose in a workflow use: node
# (the resolver injects a directive so the verdict is returned as this JSON).
output_schema:
  type: object
  required: [pass, issues]
  properties:
    pass: { type: boolean }
    issues:
      type: array
      items:
        type: object
        required: [severity, location, message]
        properties:
          severity: { type: string, enum: [block, warn] }
          location: { type: string }
          message: { type: string }
