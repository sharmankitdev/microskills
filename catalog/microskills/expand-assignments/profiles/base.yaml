version: 1
inputs:
  seats:
    default: "1"
output_schema:
  type: object
  required: [pairs, pair_count, item_count, lens_count, seats]
  properties:
    pairs:
      type: array
      items:
        type: object
        required: [item, lens, seat]
        properties:
          item:
            type: object
          lens:
            type: [string, "null"]
          seat:
            type: integer
    pair_count:
      type: integer
    item_count:
      type: integer
    lens_count:
      type: integer
    seats:
      type: integer

# The body Reads the optional items_path table; the requirement pins the tool
# surface to [Read] (pure data transform — no writes).
runtime:
  allowed_tools: [Read]
