version: 1

# The two body contract vars. Base preserves the original code-review behavior
# byte-for-byte in MEANING: blocker-driven verdict, inline markdown report.
# The design profile overrides both (file + sidecar target; major-strict mapping).
vars:
  verdict_mapping: >-
    a surviving blocker-severity finding gives request_changes; only
    non-blocker survivors give comment; no survivors gives approve.
  report_target: >-
    inline only — return the rendered markdown as the report_markdown field of
    the structured result; write nothing to disk.
inputs:
  change_summary:
    required: true
  findings:
    required: true
  verifications:
    required: true
# synthesize-review is a structured join + judgement-based dedup of verified findings -> Sonnet
# per the model-tier policy (templates/references/model-tier-policy.md).
runtime:
  model: sonnet
output_schema:
  type: object
  required:
    - verdict
    - blocker_count
    - summary
    - report_markdown
    - findings
  properties:
    verdict:
      type: string
      enum:
        - approve
        - comment
        - request_changes
    blocker_count:
      type: integer
    summary:
      type: string
    report_markdown:
      type: string
    findings:
      type: array
      items:
        type: object
