version: 1

# `diff_path` is Required=yes in the MICROSKILL.md table, so the resolver needs
# inputs.diff_path.required: true to gather it at runtime; it is passed by
# reference (`materialize: file`; the body Reads it). `context` is optional with a
# null default, so it needs no entry. No input declares a non-null default.
inputs:
  diff_path:
    required: true
    materialize: file

# The body Reads the diff file at diff_path, so Read must be allowlisted (the
# dispatcher's allowed-tools step-prose audit blocks a step naming an unlisted tool).
runtime:
  allowed_tools: [Read]

output_schema:
  type: object
  required: [summary, files, risk_surface, stats]
  properties:
    summary:
      type: string
    files:
      type: array
      items:
        type: object
        required: [path, change_kind, hunks, insertions, deletions, language]
        properties:
          path:
            type: string
          change_kind:
            type: string
            enum: [added, modified, deleted, renamed]
          hunks:
            type: integer
          insertions:
            type: integer
          deletions:
            type: integer
          language:
            type: string
    risk_surface:
      type: string
    stats:
      type: object
      required: [files_changed, insertions, deletions]
      properties:
        files_changed:
          type: integer
        insertions:
          type: integer
        deletions:
          type: integer
