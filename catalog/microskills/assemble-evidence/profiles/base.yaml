version: 1

# The active ledger scope. Substituted as {{ledger_scope}} in the read-scope step
# and the scope-unresolved failure mode. Base = the consolidated product-pipeline
# scope (the backlog leaf's record set); a stage profile (requirements / ux-stage /
# design) swaps this var, declares its own record inputs, and REPLACES the schema
# with that stage's record contract.
vars:
  ledger_scope: >-
    CONSOLIDATED PIPELINE SCOPE. Expected records: requirements_evidence,
    ux_evidence, design_evidence, backlog_evidence, classification (each an
    optional whole object; null = an explicit "absent" ledger entry — an absent
    ux_evidence entry carries the annotation mapped from classification.has_ui:
    false = "skipped by design", true = "evidence missing"). Escalation
    derivation: for the backlog_evidence record, its escalations are the
    concatenation of its coverage_triage and quality_triage sub-records'
    remaining_escalations arrays (a null sub-record contributes nothing);
    for every other record, concatenate
    each present record's escalations array, prefixed with its stage name.
    gates_taken sources: each present record's gates_taken array, plus one entry
    for the classification gate built from the classification_gate_choice and
    classification_gate_mode inputs. Exhaust-accept derivation: a present record
    whose loop converged field is false implies an accept was recorded at
    exhaustion — add one exhaust-accept ledger entry naming that stage. Ledger
    location: ledger.md and ledger.json directly under output_dir; ledger_path
    is the ledger.json path. stages_green is true only when every record the
    scope expects given the classification is present AND green.

# `output_dir` is Required=yes in the MICROSKILL.md table, so the resolver needs
# inputs.output_dir.required: true to gather it at runtime. The record inputs are
# all optional with null defaults, so they need no entry.
inputs:
  output_dir:
    required: true

# The body Reads any path-shaped record content and Writes ledger.md + ledger.json
# under output_dir.
runtime:
  allowed_tools: [Read, Write]

output_schema:
  type: object
  required: [ledger_path, unresolved_count, stages_green, summary]
  properties:
    ledger_path: { type: string }
    unresolved_count: { type: integer }
    stages_green: { type: boolean }
    summary: { type: string }
