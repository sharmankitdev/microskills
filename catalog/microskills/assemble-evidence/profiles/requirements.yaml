version: 1

# Requirements-stage ledger overlay for assemble-evidence (MULTIAGENTIC-DESIGN
# §3.2 / seam S1 — minted for refine-requirements' assemble_req_evidence node).
# Three deltas, per the W7 one-base-plus-scope-var mechanism:
#   1. vars.ledger_scope REPLACES base's consolidated-pipeline scope (scalar
#      replace) with this stage's record contract.
#   2. inputs registers the record names the leaf wires (the collect-findings
#      optional-input precedent: each entry is an empty map — optional, null
#      default; declaring the name is the whole point). output_dir stays
#      required via base; base's pipeline record inputs (requirements_evidence,
#      ux_evidence, …) deep-merge in, stay optional, and simply go unsupplied.
#   3. output_schema REPLACES base wholesale (resolver replace rule) with the
#      S1 stage record the parent declares on its requirements node.
# runtime.allowed_tools [Read, Write] inherits from base via deep-merge.
vars:
  ledger_scope: >-
    REQUIREMENTS STAGE SCOPE (refine-requirements leaf, seam S1). Expected
    records: synthesis (the critique-loop verdict object — verdict,
    blocker_count, confirmed_count, refuted_count, needs_human_count,
    findings, red_items, report_path, summary), closures (the gap-closure
    refute-vote tally — verdict, upheld, refuted, needs_human, upheld_count,
    refuted_count, needs_human_count, attention_count, blocker_count,
    group_count, pair_count, verdicts_received, seats, report_path, summary),
    loop_record (the committed critique-loop pseudo-result {converged, rounds,
    carry}), refinement_record (the clarify Q&A record; null = no
    clarification round ran, recorded as an explicit "absent" entry),
    presentation_record (the present_refined review record {action,
    document_path, remediation_rounds}), triage_record (the triage_reopened
    record {action, remediated_count, remaining_escalations,
    refreshed_report_path, post_counts}; null = the closure tally was green,
    recorded as an explicit "absent" entry), and document_path (the
    requirements document) — each an optional null-safe whole value.
    Escalation derivation (linear mapping): escalations = every
    remaining_escalations item of a present triage_record carried verbatim
    (each already {kind, ref, detail}; a null triage_record contributes zero
    entries) plus the exhaust-accept entry derived below; unresolved_count =
    the length of escalations. A present triage_record's refreshed_report_path
    and post_counts are stamped side by side with the pre-remediation
    synthesis values in the ledger (a null refreshed_report_path is recorded
    as "no remediation round ran" — the W2 re-commit-by-record convention).
    gates_taken sources: none — gates_taken is the empty array, and no
    gates_mode literal is wired here; the terminal approve_requirements gate
    post-dates this node, so its choice lives only in the run journal (the
    documented W1 residual — record that note verbatim in the ledger's notes).
    Exhaust-accept derivation: a loop_record whose converged field is false
    implies an accept was recorded at the exhaustion gate — add one
    exhaust-accept entry naming the critique loop. Coverage caps: record under
    the ledger's coverage_caps that the closure-vote claim basis is the
    LEDGERED gaps only (the round-1 gaps plus every gap id in the answers
    ledger; a gap surfaced and auto-resolved in-round, never ledgered, is
    untested by the vote — the basis is named, never implied total: the W3
    residual). stages_green is ledger-internal for this single-stage scope —
    the returned object omits it. Ledger location: ledger.md and ledger.json
    under <output_dir>/evidence/requirements/; ledger_path is the ledger.json
    path. Returned object: document_path passed through; ledger_path; evidence
    = {report_path: the synthesis report_path, tallies: the closure-vote
    counts plus the synthesis counts}; escalations; unresolved_count; summary
    (one line).

inputs:
  synthesis: {}
  closures: {}
  loop_record: {}
  refinement_record: {}
  presentation_record: {}
  triage_record: {}
  document_path: {}

# The S1 stage record contract — the parent's requirements node output_schema.
output_schema:
  type: object
  required: [document_path, ledger_path, evidence, escalations,
             unresolved_count, summary]
  properties:
    document_path: { type: string }
    ledger_path: { type: string }
    evidence:
      type: object
      required: [report_path, tallies]
      properties:
        report_path: { type: string }
        tallies: { type: object }
    escalations:
      type: array
      items:
        type: object
        required: [kind, ref, detail]
        properties:
          kind: { type: string }
          ref: { type: string }
          detail: { type: string }
    unresolved_count: { type: integer }
    summary: { type: string }
