version: 1

# UX-stage ledger overlay for assemble-evidence (MULTIAGENTIC-DESIGN §3.2 /
# seam S2 — minted for the ux-design leaf's finalize node). Three deltas, per
# the W7 one-base-plus-scope-var mechanism:
#   1. vars.ledger_scope REPLACES base's consolidated-pipeline scope (scalar
#      replace) with this stage's record contract.
#   2. inputs registers the record names the leaf wires (the collect-findings
#      optional-input precedent: empty maps — optional, null default;
#      declaring the name is the whole point). output_dir stays required via
#      base; base's pipeline record inputs deep-merge in and go unsupplied.
#      gates_mode arrives as a literal `human` from the leaf's base graph; the
#      leaf's autonomous overlay patches the NODE input to `auto-default` — a
#      workflow-side patch, so nothing mode-related changes in this file (W1).
#   3. output_schema REPLACES base wholesale (resolver replace rule) with the
#      S2 stage record the parent declares on its ux node.
# runtime.allowed_tools [Read, Write] inherits from base via deep-merge.
vars:
  ledger_scope: >-
    UX STAGE SCOPE (ux-design leaf, seam S2). Expected records:
    wireframes_path (the wireframes document path), screens (the screens
    array, each {name, journey_refs}), signoff (the choice recorded at the
    signoff gate), rounds (hardening-loop rounds actually run), converged (the
    hardening loop's converged boolean), judge_record (the wireframe
    judge-panel record — winner_label, winner_path, graft_notes,
    candidates_considered, judges_heard, judges_path, summary), iterate_record
    (the iterate steering record {choice, wireframes_path, rounds, notes} —
    recorded as steering provenance), final_review (the post-refute synthesis
    — verdict, blocker_count, confirmed_count, refuted_count,
    needs_human_count, findings, red_items, report_path, summary),
    triage_record (the triage_unconverged record {action,
    remaining_escalations, refreshed_report_path, post_counts}; null = the
    loop converged, recorded as an explicit "absent" entry), and gates_mode
    (the literal mode the active workflow profile stamps on gate records) —
    each an optional null-safe whole value. Escalation derivation (linear
    mapping): one needs_human entry per needs_human-verdict survivor in the
    final_review (count given by its needs_human_count; detail Read from the
    .json sidecar at its report_path); one advisory_accept entry per
    remaining_escalations item of a present triage_record (a null
    triage_record contributes zero entries); plus the exhaust-accept entry
    derived below. A present triage_record's refreshed_report_path and
    post_counts are stamped side by side with the pre-remediation final_review
    values in the ledger (a null refreshed_report_path is recorded as "no
    remediation round ran" — the W2 re-commit-by-record convention).
    gates_taken sources: exactly one entry — {id: signoff, choice: the signoff
    input, mode: the gates_mode literal}. Exhaust-accept derivation: a
    converged value of false implies an accept was recorded at the exhaustion
    gate — add one exhaust-accept entry naming the hardening loop.
    stages_green and unresolved_count are ledger-internal for this
    single-stage scope — the returned object omits both (the escalations array
    carries the unresolved set). Ledger location: ledger.md and ledger.json
    under <output_dir>/evidence/ux/. Returned object: ux_dir =
    <output_dir>/ux; wireframes_path, screens, signoff, and rounds passed
    through; gates_taken as derived; evidence = {report_path: the final_review
    report_path, judges_path: the judge_record judges_path, tallies:
    {findings, confirmed, refuted, needs_human} from the final_review counts};
    escalations; summary (one line).

inputs:
  wireframes_path: {}
  screens: {}
  signoff: {}
  rounds: {}
  converged: {}
  judge_record: {}
  iterate_record: {}
  final_review: {}
  triage_record: {}
  gates_mode: {}

# The S2 stage record contract — the parent's ux node output_schema. screens
# minItems 1 is load-bearing: a UI product whose UX stage ends with zero
# screens fails the run mechanically at this node (stage-ux-design §9).
output_schema:
  type: object
  required: [ux_dir, wireframes_path, screens, signoff, rounds, gates_taken,
             evidence, escalations, summary]
  properties:
    ux_dir: { type: string }
    wireframes_path: { type: string }
    screens:
      type: array
      minItems: 1
      items:
        type: object
        required: [name, journey_refs]
        properties:
          name: { type: string }
          journey_refs:
            type: array
            items: { type: string }
    signoff: { type: string }
    rounds: { type: integer }
    gates_taken:
      type: array
      items:
        type: object
        required: [id, choice, mode]
        properties:
          id: { type: string }
          choice: { type: string }
          mode: { type: string }
    evidence:
      type: object
      required: [report_path, judges_path, tallies]
      properties:
        report_path: { type: string }
        judges_path: { type: string }
        tallies: { type: object }
    escalations:
      type: array
      items:
        type: object
        required: [kind, ref, detail]
        properties:
          kind: { type: string }
          ref: { type: string }
          detail: { type: string }
    summary: { type: string }
