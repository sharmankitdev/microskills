version: 1

# Comprehensive SE template: a richer skeleton for large or regulated efforts — adds data
# model, interfaces, security/privacy, dependencies, risks, rollout/migration, observability.
# Overrides ONLY the template var; everything else inherits from base.
vars:
  requirements_template: |
    # <Requirements Document Title>

    ## 1. Overview & Context
    ## 2. Goals & Non-Goals
    ## 3. Stakeholders & Actors
    ## 4. Functional Requirements
    ## 5. Non-Functional Requirements
    ## 6. Data Model & Entities
    ## 7. Interfaces & APIs
    ## 8. Security, Privacy & Compliance
    ## 9. Constraints & Assumptions
    ## 10. Dependencies & Integrations
    ## 11. Acceptance Criteria
    ## 12. Risks & Mitigations
    ## 13. Rollout & Migration
    ## 14. Telemetry & Observability
    ## 15. Open Questions / Gaps
    ## 16. Out of Scope
