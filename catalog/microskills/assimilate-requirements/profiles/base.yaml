version: 1

# Default balanced SE requirements template, carried as a var so it is (a) substituted
# inline as {{requirements_template}} in the body, (b) overridable at call time via
# --override vars.requirements_template="...", and (c) swappable per profile (lean /
# comprehensive) as a one-key deep-merge delta. A per-call template_path input file takes
# precedence over this value (resolved in step 2 of the body).
vars:
  requirements_template: |
    # <Requirements Document Title>

    ## 1. Overview & Context
    ## 2. Goals & Non-Goals
    ## 3. Stakeholders & Actors
    ## 4. Functional Requirements
    ## 5. Non-Functional Requirements
    ## 6. Constraints & Assumptions
    ## 7. Acceptance Criteria
    ## 8. Open Questions / Gaps
    ## 9. Out of Scope

# sources_path is Required=yes in the MICROSKILL.md table, so the resolver needs
# inputs.sources_path.required: true to gather it at runtime. materialize: file marks the
# large / multi-shape input passed BY REFERENCE — the dispatcher normalizes the caller's
# string / file / directory into one canonical file and supplies only the short path (the
# body Reads it). output_dir / document_name are optional knobs with defaults; template_path
# and prior_answers_path are optional and only materialized when the caller supplies them.
inputs:
  sources_path:
    required: true
    materialize: file
  output_dir:
    default: "."
  document_name:
    default: requirements.md
  template_path:
    materialize: file
  prior_answers_path:
    materialize: file

# The body Reads sources / template / prior-answers and Writes one document — nothing else.
# AskUserQuestion is deliberately absent so a workflow use: node stays a BACKGROUND segment
# (the refinement loop + human questioning live in the refine-requirements orchestrator).
runtime:
  allowed_tools: [Read, Write]

# Authoritative definition of a gap, supplied as reference context so step 5 detects
# consistently across runs and template variants. A fixed rubric cited by the body — NOT the
# swappable skeleton (that is vars.requirements_template above). Inherited unchanged by the
# lean / comprehensive overlays.
context:
  snippets:
    - name: gap-criteria
      text: >-
        A template section is a GAP in one of three kinds. unfilled: no source statement
        maps to the section, or the mapped content is a bare placeholder. ambiguous: the
        section has content but it is vague, underspecified, or open to multiple readings
        that change implementation. contradictory: two or more source statements map to the
        section and cannot both hold. Every gap carries a focused clarifying question whose
        answer would close it, and a severity — blocker (the document is not viable without
        it), major (substantially incomplete), or minor (worth clarifying). Structural sections
        that summarize or enumerate rather than capture source requirements — for example Open
        Questions / Gaps (which holds the gap list itself) and Out of Scope (which holds non-goals)
        — are NOT gaps when they have no source statements; fill them with derived content and
        exclude them from gaps_count.

output_schema:
  type: object
  required: [document_path, gaps, gaps_count, summary]
  properties:
    document_path:
      type: string
    gaps:
      type: array
      items:
        type: object
        required: [id, section, kind, question, severity]
        properties:
          id: { type: string }
          section: { type: string }
          kind: { type: string, enum: [unfilled, ambiguous, contradictory] }
          question: { type: string }
          severity: { type: string, enum: [blocker, major, minor] }
          detail: { type: string }
    gaps_count:
      type: integer
    summary:
      type: string
