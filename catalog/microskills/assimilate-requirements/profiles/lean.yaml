version: 1

# Lean SE template: the minimal viable requirements skeleton for a spike or a one-pager.
# Overrides ONLY the template var; body / inputs / output_schema / gap-criteria inherit from base.
vars:
  requirements_template: |
    # <Requirements Document Title>

    ## 1. Context
    ## 2. Goals & Non-Goals
    ## 3. Functional Requirements
    ## 4. Acceptance Criteria
    ## 5. Open Questions / Gaps
    ## 6. Out of Scope
