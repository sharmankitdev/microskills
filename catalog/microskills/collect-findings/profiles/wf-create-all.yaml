version: 1

# Workflow-create COMBINED review fan-in overlay for collect-findings (§8 step 7).
# Registers the 7 artifact-stage workflow dimension input names (wf-create) AND the
# 3 cross-artifact dimension input names (cross-create) so a SINGLE collect fans in
# the whole review panel — collect-findings stamps `dimension` from each input's
# {dimension, findings} shape and re-assigns global_ids across the combined set, which
# it cannot do losslessly across two already-collected {findings,count} results, so
# the host-inline RVS unions the two fan-outs HERE rather than merging downstream.
# The 7 wf names ride via inputs_each: review; the 3 cross names are wired explicitly
# from the xreview fan-out (inputs_each + explicit inputs coexist — only a key
# collision blocks). Base's six code-review inputs deep-merge in unused. Each entry is
# an empty map (declaring the name is the whole point). Names = the review-dimension
# fan-out item names with hyphen→underscore (the inputs_each desugar contract).
inputs:
  # artifact-stage workflow dimensions (= collect-findings/profiles/wf-create.yaml)
  wf_dag_decomposition_correctness: {}
  wf_guard_logic_intent: {}
  wf_prompt_task_fidelity: {}
  wf_gate_prompt_options_quality: {}
  wf_profile_overlay_coherence: {}
  wf_spill_materialize_judgment: {}
  wf_output_schema_downstream_fit: {}
  # cross-artifact dimensions (= collect-findings/profiles/cross-create.yaml)
  duplicate_capability: {}
  naming_collision: {}
  reverse_consumer: {}
