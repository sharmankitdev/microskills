version: 1

# Microskill-create COMBINED review fan-in overlay for collect-findings — the ms twin of
# wf-create-all (§8 step 7 / sub-PR 4, for implement-rvs's microskill-create profile).
# Registers the 11 artifact-stage microskill dimension input names AND the 3 cross-artifact
# dimension input names so a SINGLE collect fans in the whole microskill review panel —
# collect-findings stamps `dimension` from each input's {dimension, findings} shape and
# re-assigns global_ids across the combined set, which it cannot do losslessly across two
# already-collected {findings,count} results, so the host-inline RVS unions the two fan-outs
# HERE rather than merging downstream. The 11 ms names ride via inputs_each: review; the 3
# cross names are wired explicitly from the xreview fan-out (inputs_each + explicit inputs
# coexist — only a key collision blocks). Base's six code-review inputs deep-merge in unused.
# Each entry is an empty map (declaring the name is the whole point). Names = the
# review-dimension fan-out item names with hyphen→underscore (the inputs_each desugar contract).
inputs:
  # artifact-stage microskill dimensions (review-dimension profiles ms-*)
  ms_atomicity_single_purpose: {}
  ms_single_linear_path_semantic: {}
  ms_step_atomicity_linearity: {}
  ms_inputs_contract_adequacy: {}
  ms_output_contract_appropriate: {}
  ms_failure_modes_coverage: {}
  ms_output_section_vs_schema_fields: {}
  ms_step_input_reference_undeclared: {}
  ms_declared_input_unused: {}
  ms_purpose_contract_fidelity: {}
  ms_description_trigger_quality: {}
  # cross-artifact dimensions (= collect-findings/profiles/cross-create.yaml)
  duplicate_capability: {}
  naming_collision: {}
  reverse_consumer: {}
