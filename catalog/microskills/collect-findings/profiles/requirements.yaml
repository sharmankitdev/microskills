version: 1

# Requirements-critic fan-in overlay for collect-findings (MULTIAGENTIC-DESIGN
# §3.2 — the ONE profile of this name, minted by the requirements build). The
# body already speaks of "every supplied optional dimension result object", so
# this overlay's ONLY job is to register the input names refine-requirements'
# four-dimension critic panel wires (review-dimension profiles req-user-value /
# req-edge-cases / req-nfr / req-testability). Base's six code-review inputs
# are NOT renamed — they deep-merge in, stay optional, and simply go unsupplied.
# Each entry is an empty map: an optional input with a null default needs no
# required/materialize/default keys; declaring the name is the whole point.
inputs:
  req_user_value: {}
  req_edge_cases: {}
  req_nfr: {}
  req_testability: {}
