version: 1

# LLD-review fan-in overlay for collect-findings (MULTIAGENTIC-DESIGN §3.2,
# minted by the technical-design build). Registers the input names the
# 3-dimension × N-document LLD cross-product wires (review-dimension profiles
# lld-fidelity / lld-completeness / lld-feasibility). UNLIKE the sibling
# profiles, each input here arrives ARRAY-shaped — a for_each fan-out's
# per-document list of {dimension, findings} result objects, one element per
# LLD doc — not a single result object. No body or schema change is needed:
# the body's concatenate step explicitly flattens any supplied input that is
# itself an array of result objects into its elements before concatenation.
# Base's six code-review inputs are NOT renamed — they deep-merge in, stay
# optional, and go unsupplied. Each entry is an empty map: optional with a
# null default needs no behavioral keys; declaring the name registers it.
inputs:
  lld_fidelity: {}
  lld_completeness: {}
  lld_feasibility: {}
