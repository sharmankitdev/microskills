version: 1

# Test-coverage dimension overlay for review-dimension. Overrides the active
# dimension and its rubric snippet. The rubric references the optional `threshold`
# input — the minimum acceptable coverage percentage for new/changed logic (default
# 80 when no threshold is supplied). output_schema, inputs, the body, and the default
# model are inherited from base.
vars:
  dimension: test-coverage

context:
  snippets:
    - name: test-coverage-rubric
      text: >-
        Test-coverage rubric: judge whether the change carries adequate tests,
        treating the optional `threshold` input as the minimum acceptable coverage
        percentage for new or changed logic (default 80 when no threshold is
        supplied). Flag only coverage gaps — new or modified functions, branches,
        or error paths added without corresponding test changes; new conditionals,
        loops, or edge cases left unexercised; bug fixes landed without a
        regression test; changed public behavior whose tests were not updated;
        whole new modules or files with no accompanying tests. When the proportion
        of new or changed logic that appears covered by added or updated tests
        falls below the threshold, raise it and cite the untested code. Do not
        raise correctness, security, performance, style, or documentation-only
        concerns under this rubric.
