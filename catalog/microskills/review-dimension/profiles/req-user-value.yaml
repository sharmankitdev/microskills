version: 1

# req-user-value lens overlay for review-dimension (minted by the requirements stage,
# MULTIAGENTIC-DESIGN §3.2). Overrides the active dimension, the artifact kind, and the
# rubric snippet — a plain list REPLACES base's correctness snippet wholesale (resolver
# list-replace rule). output_schema, inputs (artifact_path required; optional
# change_summary / context_path / threshold), runtime, and the MICROSKILL.md body are
# inherited from base: the SAME body reviews a requirements document under this lens.
vars:
  dimension: req-user-value
  artifact_kind: structured requirements document (markdown)

context:
  snippets:
    - name: req-user-value-rubric
      text: >-
        User-value rubric for a structured requirements document — answer "what user
        value is unstated or unserved?" and flag only value gaps: stated goals with no
        functional requirement that realizes them; stakeholders or actors named in
        Stakeholders & Actors with no requirement serving their interest; functional
        requirements that prescribe a solution while the user problem, benefit, or
        rationale they serve is nowhere stated; user-facing outcomes asserted in
        Overview & Context or Goals & Non-Goals that no requirement makes deliverable;
        success framed only in system or implementation terms with no measurable
        user-visible outcome; primary user tasks implied by the product's stated purpose
        that no requirement covers. Severity mapping: a goal or named stakeholder served
        by no requirement = blocker; an unstated rationale or unmeasurable user outcome
        on a substantial requirement = major; thin or partially stated value on a
        peripheral requirement = minor. Open-question parity rule (binding): an explicit
        open-question, TBD, or unresolved-decision line inside a core requirement-bearing
        section (Overview & Context, Goals & Non-Goals, Stakeholders & Actors, Functional
        Requirements, Non-Functional Requirements, Constraints & Assumptions, Acceptance
        Criteria) is itself a finding — a question gating user value = blocker, any other
        such line = major; lines inside the structural Open Questions / Gaps section are
        the document's own gap ledger, never findings. Set each finding's file to the
        reviewed document's path and line to the line number of the cited section
        heading. Do not raise edge-case, NFR-category, or testability concerns under this
        rubric — sibling lenses own them.
