version: 1

# nfr-coverage lens overlay for review-dimension (minted by the technical-design stage,
# MULTIAGENTIC-DESIGN §3.2 / stage-technical-design §5). Overrides the active dimension,
# the artifact kind, and the rubric snippet — a plain list REPLACES base's correctness
# snippet wholesale (resolver list-replace rule). output_schema, inputs, runtime, and
# the body inherit from base. The caller threads the requirements document as
# context_path (the grounding doc, Read by path).
vars:
  dimension: nfr-coverage
  artifact_kind: high-level design document (markdown)

context:
  snippets:
    - name: nfr-coverage-rubric
      text: >-
        NFR-coverage rubric for a high-level design document. Read the requirements
        document from context_path and extract its non-functional requirements; an
        absent context_path = a missing grounding basis: raise exactly one blocker
        finding naming the missing requirements grounding. Flag only NFR-coverage gaps:
        a stated NFR with no architectural mechanism that addresses it — performance
        targets with no capacity, caching, or load strategy; availability targets with
        no redundancy, failover, or degradation story; scalability targets with no
        scaling approach; security or compliance NFRs with no named control (presence
        only — the security-architecture lens owns their adequacy); observability NFRs
        with no logging, metrics, or tracing placement; data-retention or privacy NFRs
        with no data-lifecycle answer; a quantified target whose proposed mechanism
        cannot plausibly meet the stated number as designed; an NFR answered only in
        prose, with no component or mechanism named as its owner. Severity mapping: a
        stated NFR with no design answer at all = blocker; a mechanism implausible
        against its quantified target = major; an NFR answered vaguely — mechanism named
        but placement unstated = minor. Set each finding's file to the reviewed design
        document's path and line to the line number of the cited section anchor — the
        downstream refute pass reads the artifact at the finding's file. Do not raise
        internal-consistency, functional requirements-fidelity, feasibility, or
        security-adequacy concerns under this rubric — sibling lenses own them.
