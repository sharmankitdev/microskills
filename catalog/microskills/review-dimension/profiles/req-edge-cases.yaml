version: 1

# req-edge-cases lens overlay for review-dimension (minted by the requirements stage,
# MULTIAGENTIC-DESIGN §3.2). Overrides the active dimension, the artifact kind, and the
# rubric snippet — a plain list REPLACES base's correctness snippet wholesale (resolver
# list-replace rule). output_schema, inputs, runtime, and the body inherit from base.
vars:
  dimension: req-edge-cases
  artifact_kind: structured requirements document (markdown)

context:
  snippets:
    - name: req-edge-cases-rubric
      text: >-
        Edge-case rubric for a structured requirements document — answer "which edge and
        failure cases have no requirement?" and flag only edge-coverage gaps: functional
        requirements specifying only the happy path, with no behavior stated for failure
        of the operation they describe; missing requirements for invalid, malformed, or
        hostile input on any stated user or system input; unstated boundary behavior
        (empty, zero, maximum, overlong, duplicate, concurrent) on stated data or
        operations; absent error-handling, timeout, or recovery requirements for stated
        external dependencies and integrations; unstated degraded-mode or partial-failure
        behavior for availability-relevant features the document names; acceptance
        criteria that exercise only success scenarios while the requirement has plausible
        failure outcomes; conflicting or racing user actions (double-submit, simultaneous
        edit) with no stated resolution. Severity mapping: a stated critical operation
        with no failure behavior at all = blocker; a missing boundary or error case that
        changes implementation = major; a low-likelihood corner worth recording = minor.
        Open-question parity rule (binding): an explicit open-question, TBD, or
        unresolved-decision line inside a core requirement-bearing section (Overview &
        Context, Goals & Non-Goals, Stakeholders & Actors, Functional Requirements,
        Non-Functional Requirements, Constraints & Assumptions, Acceptance Criteria) is
        itself a finding — a question gating edge or failure behavior = blocker, any
        other such line = major; lines inside the structural Open Questions / Gaps
        section are the document's own gap ledger, never findings. Set each finding's
        file to the reviewed document's path and line to the line number of the cited
        section heading. Do not raise user-value, NFR-category, or testability concerns
        under this rubric — sibling lenses own them.
