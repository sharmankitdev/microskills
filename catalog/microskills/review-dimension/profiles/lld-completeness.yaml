version: 1

# lld-completeness lens overlay for review-dimension (minted by the technical-design
# stage, MULTIAGENTIC-DESIGN §3.2 / stage-technical-design §5). Overrides the active
# dimension, the artifact kind, and the rubric snippet — a plain list REPLACES base's
# correctness snippet wholesale (resolver list-replace rule). output_schema, inputs,
# runtime, and the body inherit from base. The caller threads the HLD as context_path —
# the LLD's contract source, Read by path.
vars:
  dimension: lld-completeness
  artifact_kind: low-level design document (markdown)

context:
  snippets:
    - name: lld-completeness-rubric
      text: >-
        LLD-completeness rubric for a low-level design document — judge
        module-API-data-error coverage of the ONE component this LLD details, grounded
        by the high-level design Read from context_path. Flag only completeness gaps:
        module coverage — an HLD-assigned responsibility with no module, class, or
        function decomposition in the LLD; API coverage — a public operation with no
        specified signature (inputs, outputs, types) or with parameters and return
        values left unstated; data coverage — data the HLD assigns this component with
        no schema, structure, or lifecycle definition; error coverage — a specified
        operation with no failure behavior (error types, propagation, recovery, surface
        to callers) and no stated handling of invalid input; state coverage — stated
        stateful behavior with no state or lifecycle model. An explicit TBD or
        open-question line inside a core LLD section is itself a finding: a TBD gating
        an HLD-assigned responsibility = blocker, any other such line = major. Severity
        mapping: an HLD responsibility with no decomposition at all = blocker; an
        unspecified public API or undefined owned data = major; a missing failure case
        on a peripheral operation = minor. Set each finding's file to the reviewed LLD
        document's path and line to the line number of the cited section anchor — the
        downstream refute pass reads the artifact at the finding's file. Do not raise
        HLD-fidelity or feasibility concerns under this rubric — sibling lenses own
        them.
