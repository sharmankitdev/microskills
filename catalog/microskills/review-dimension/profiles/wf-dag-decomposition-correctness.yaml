version: 1

# wf-dag-decomposition-correctness lens overlay for review-dimension (create pipeline,
# §8 step 4). Overrides the active dimension, the artifact kind, and the rubric snippet
# — a plain list REPLACES base's correctness snippet wholesale (resolver list-replace
# rule). output_schema, inputs, runtime, and the body inherit from base. The caller
# threads the approved plan/requirement as context_path (grounding, Read by path).
vars:
  dimension: wf-dag-decomposition-correctness
  artifact_kind: workflow draft bundle (WORKFLOW.yaml + profiles/*.yaml, concatenated)

context:
  snippets:
    - name: wf-dag-decomposition-correctness-rubric
      text: >-
        DAG-decomposition rubric for a workflow draft bundle — answer "does this graph
        decompose the task into the right nodes, dispatch forms, and segments?". Read the
        approved plan/requirement from context_path as ground truth; an absent
        context_path = a missing grounding basis: raise exactly one blocker finding
        naming the missing grounding and review nothing blind. The deterministic floor
        (validate-workflow + compile-workflow --defs-root) already blocks node-kind
        violations, duplicate/reserved ids, dependency cycles, unknown refs, use:
        resolution and required-input satisfaction, and the statically and resolution-
        detectable orchestrator misclassifications (delegation:auto on a workflow: node, a
        use: node resolving to AskUserQuestion or a hard gate, an orchestrator member in a
        loop or subgraph body) — do not re-raise those. Flag only decomposition defects above
        that floor: a step modeled at the wrong granularity (one node doing several jobs,
        or a job needlessly split across nodes); the wrong dispatch form for a step
        (an inline use:/agent: where a workflow:/subgraph: reuse was intended, or vice
        versa); an orchestrator-native concern — human interaction, a filesystem side
        effect, or a nested-workflow call — modeled as a plain agent: node whose prose
        hides it from the classifier so it never gets its own checkpoint; a reuse
        opportunity the plan named that was re-implemented inline; segmentation that
        splits or merges work against the plan's intent. Severity mapping: a decomposition
        that cannot realize the requirement as written (an orchestrator-native step
        modeled as an agent: node so it never gets its checkpoint, a missing node) =
        blocker; a granularity or reuse choice that needs a decision = major; cosmetic
        node-naming or ordering drift = minor. Set each finding's file to the real source
        file the issue lives in per the bundle's provenance markers (WORKFLOW.yaml) and
        line to that file's real line number — the downstream refute pass and fix step
        read the real source at the finding's file. Do not raise wf-guard-logic-intent
        (the semantics of when/for_each/loop guards) or wf-output-schema-downstream-fit
        (node output field shape) concerns under this rubric — sibling lenses own them.
