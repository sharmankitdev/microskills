version: 1

# req-testability lens overlay for review-dimension (minted by the requirements stage,
# MULTIAGENTIC-DESIGN §3.2). Overrides the active dimension, the artifact kind, and the
# rubric snippet — a plain list REPLACES base's correctness snippet wholesale (resolver
# list-replace rule). output_schema, inputs, runtime, and the body inherit from base.
vars:
  dimension: req-testability
  artifact_kind: structured requirements document (markdown)

context:
  snippets:
    - name: req-testability-rubric
      text: >-
        Testability rubric for a structured requirements document — answer "which
        requirements have no testable acceptance criterion?" and flag only testability
        gaps: functional requirements with no acceptance criterion in Acceptance Criteria
        traceable to them; acceptance criteria with no observable outcome or pass/fail
        condition (no input, expected result, or verification method stated); requirements
        phrased with subjective qualifiers ("intuitive", "fast", "robust",
        "user-friendly") and no measurable proxy anywhere in the document; criteria that
        merely restate the requirement instead of defining its verification; criteria
        that presuppose verification facilities (test data, environments, instrumentation)
        the document nowhere provides for; ambiguous quantifiers ("most", "usually",
        "appropriate") inside criteria that are testable in every other respect.
        Severity mapping: a
        substantial functional requirement with no traceable acceptance criterion =
        blocker; an unverifiable or subjective criterion on a substantial requirement =
        major; a vague quantifier on a criterion testable in every other respect = minor.
        Open-question parity rule (binding): an explicit open-question, TBD, or
        unresolved-decision line inside a core requirement-bearing section (Overview &
        Context, Goals & Non-Goals, Stakeholders & Actors, Functional Requirements,
        Non-Functional Requirements, Constraints & Assumptions, Acceptance Criteria) is
        itself a finding — a question gating verifiability = blocker, any other such
        line = major; lines inside the structural Open Questions / Gaps section are the
        document's own gap ledger, never findings. Set each finding's file to the
        reviewed document's path and line to the line number of the cited section
        heading. Do not raise user-value, edge-case, or NFR-category concerns under this
        rubric — sibling lenses own them.
