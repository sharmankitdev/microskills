version: 1

# ux-requirements-fidelity lens overlay for review-dimension (minted by the ux-design
# stage, MULTIAGENTIC-DESIGN §3.2 / stage-ux-design §6). Overrides the active dimension,
# the artifact kind, and the rubric snippet — a plain list REPLACES base's correctness
# snippet wholesale (resolver list-replace rule). output_schema, inputs, runtime, and
# the body inherit from base. The caller threads the journeys author's compact result
# object as change_summary; the journey CONTENT is Read by path, never inlined in args.
vars:
  dimension: ux-requirements-fidelity
  artifact_kind: lo-fi wireframes document (markdown)

context:
  snippets:
    - name: ux-requirements-fidelity-rubric
      text: >-
        Requirements-fidelity rubric for a lo-fi wireframes document. The optional
        structured grounding summary (change_summary) is the journeys author's result
        object — Read the journeys document at its document_path field; it encodes the
        requirement-driven tasks the wireframes must serve. A supplied context_path names
        the requirements document to Read as additional ground truth; an absent
        context_path = the journeys document stands alone as the requirements basis.
        Flag only fidelity defects: a screen whose content, controls, or copy contradicts
        a stated requirement or journey task; required functionality — a stated task,
        action, or data view — with no screen surface anywhere in the wireframes; screen
        elements, data fields, or features not derivable from any stated requirement or
        journey (invented scope); terminology on screens that drifts from the source
        documents' names for the same concept; a screen that serves a stated task only
        partially, so the task cannot be completed with the elements shown. Severity
        mapping: a direct contradiction of a stated requirement = blocker; required
        functionality with no surface, or substantial invented scope = major; terminology
        drift or partial coverage of a secondary task = minor. Keep explanations concise
        (the synthesizer caps finding prose; full detail belongs in the report). Set each
        finding's file to the wireframes document's path and line to the line number of
        the cited screen or section heading. Do not raise journey-coverage or
        flow-consistency concerns under this rubric — sibling lenses own them.
