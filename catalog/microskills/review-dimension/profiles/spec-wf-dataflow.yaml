version: 1

# spec-wf-dataflow lens overlay for review-dimension (create pipeline, §8 step 6 / D3).
# Reviews a workflow specification document for producer→consumer wiring and IO contract
# coherence. Sibling of the req-* lenses — no floor runs at this stage. A plain list
# REPLACES base's snippet wholesale. output_schema, inputs, runtime, body inherit from base.
vars:
  dimension: spec-wf-dataflow
  artifact_kind: workflow specification document

context:
  snippets:
    - name: spec-wf-dataflow-rubric
      text: >-
        Data-flow rubric for a workflow specification document — answer "do producers and
        consumers wire up, and is the inputs/output contract coherent end to end?" against
        Inputs & Output Contract, Data Flow & Dependencies, and Node Inventory. Flag only
        data-flow defects: a node consuming a field or artifact that no upstream node in
        the inventory produces (a dangling consumer); a declared workflow input that no
        node ever consumes (a dangling input); a declared output field with no producing
        node; a producer→consumer type or shape mismatch the spec states or implies (an
        array consumed as a scalar, a path consumed as an object); a large or by-reference
        payload the spec threads inline rather than by path/materialize; a stated
        dependency with no corresponding data edge, or a data edge with no stated
        dependency. Severity mapping: a consumer that dereferences a field no producer
        emits (a runtime undefined-reference) = blocker; a dangling input/output or a
        stated type mismatch = major; a by-reference/materialize judgment call or a
        missing-but-inferable edge = minor; a cosmetic data-flow wording issue = nit.
        Open-question parity rule (binding): an explicit open-question, TBD, or
        unresolved-decision line inside Inputs & Output Contract or Data Flow &
        Dependencies that gates a producer→consumer wire = blocker, any other such line in
        those sections = major; lines inside the structural Open Questions / Gaps section
        are the spec's own gap ledger, never findings. Set each finding's file to the
        reviewed document's path and line to the line number of the cited section heading.
        Do not raise spec-wf-coverage (goal→node coverage and Constraints & NFRs
        completeness) or spec-wf-controlflow (gate / loop / guard specification) concerns
        under this rubric — sibling lenses own them.
