version: 1

# ms-inputs-contract-adequacy lens overlay for review-dimension (create pipeline, §8
# step 4). Overrides the active dimension, the artifact kind, and the rubric snippet —
# a plain list REPLACES base's correctness snippet wholesale (resolver list-replace
# rule). output_schema, inputs, runtime, and the body inherit from base. The caller
# threads the approved plan/requirement as context_path (grounding, Read by path).
vars:
  dimension: ms-inputs-contract-adequacy
  artifact_kind: microskill draft bundle (MICROSKILL.md + profiles/base.yaml, concatenated)

context:
  snippets:
    - name: ms-inputs-contract-adequacy-rubric
      text: >-
        Inputs-contract-adequacy rubric for a microskill draft bundle — answer "is the
        declared input SET complete for what the requirement asks, with nothing
        invented?". Read the approved plan/requirement from context_path as ground
        truth; an absent context_path = a missing grounding basis: raise exactly one
        blocker finding naming the missing grounding and review nothing blind. The
        deterministic floor (validate-microskill) already blocks the Inputs table's
        five-column shape, the literal yes|no Required cell, the literal — Default cell,
        duplicate input names, and the required-input fidelity match (a table
        Required=yes must have base inputs.<name>.required:true) — do not re-own that
        mechanical match. Flag only input-set adequacy defects against the requirement:
        a capability the requirement implies that has no input to carry its data (a
        writer with no output_path, a reviewer with no artifact to read); an input the
        bundle declares that the requirement never asked for (invented scope); a
        Required=no input the requirement implies should be Required=yes, or the
        reverse; an input whose type or description cannot actually carry the data the
        requirement needs. Severity mapping: a required capability with no input to
        supply its data (the skill cannot do its job) = blocker; a wrong required-flag
        or an invented input that needs a human decision = major; a description or type
        imprecision on an otherwise-correct input = minor. Set each finding's file to
        the real source file the issue lives in per the bundle's provenance markers
        (MICROSKILL.md or profiles/base.yaml) and line to that file's real line number —
        the downstream refute pass and fix step read the real source at the finding's
        file. Do not raise ms-step-input-reference-undeclared (a step naming data no
        input declares) or ms-declared-input-unused (an input no step uses) concerns
        under this rubric — sibling lenses own them.
