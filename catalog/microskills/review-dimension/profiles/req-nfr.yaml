version: 1

# req-nfr lens overlay for review-dimension (minted by the requirements stage,
# MULTIAGENTIC-DESIGN §3.2). Overrides the active dimension, the artifact kind, and the
# rubric snippet — a plain list REPLACES base's correctness snippet wholesale (resolver
# list-replace rule). output_schema, inputs, runtime, and the body inherit from base.
vars:
  dimension: req-nfr
  artifact_kind: structured requirements document (markdown)

context:
  snippets:
    - name: req-nfr-rubric
      text: >-
        NFR rubric for a structured requirements document — answer "which non-functional
        categories are absent or unquantified?" Check the Non-Functional Requirements
        section against this category checklist, scoped to the product the document
        describes: performance (latency, throughput); scalability and capacity;
        availability and reliability; security and privacy; compliance and regulatory;
        usability and accessibility; observability and operability; maintainability and
        portability. Flag only NFR gaps: a category relevant to the stated scope with no
        requirement at all; an NFR stated without a quantified target, bound, or
        verifiable condition ("fast", "secure", "highly available" with no number,
        percentile, limit, or pass/fail criterion); an NFR whose stated target
        contradicts a stated constraint from Constraints & Assumptions; a quantified
        target with no stated measurement context (load, dataset size, conditions under
        measurement). Severity mapping: a clearly relevant absent category = blocker; a
        present-but-unquantified NFR = major; a quantified target missing only its
        measurement context = minor. Open-question parity rule (binding): an
        explicit open-question, TBD, or unresolved-decision line inside a core
        requirement-bearing section (Overview & Context, Goals & Non-Goals, Stakeholders
        & Actors, Functional Requirements, Non-Functional Requirements, Constraints &
        Assumptions, Acceptance Criteria) is itself a finding — a question gating a
        non-functional target = blocker, any other such line = major; lines inside the
        structural Open Questions / Gaps section are the document's own gap ledger, never
        findings. Set each finding's file to the reviewed document's path and line to the
        line number of the cited section heading. Do not raise user-value, functional
        edge-case, or testability concerns under this rubric — sibling lenses own them.
