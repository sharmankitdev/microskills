version: 1

# unanalyzable-fork-guard-no-signal lens overlay for review-dimension (create pipeline,
# §8 step 4). Overrides the active dimension, the artifact kind, and the rubric snippet
# — a plain list REPLACES base's correctness snippet wholesale (resolver list-replace
# rule). output_schema, inputs, runtime, and the body inherit from base. Guard/meta lens:
# it reports the LIMITS of static linearity analysis (absence of branch keywords is not
# proof of a single path), so it must flag UNCERTAINTY — never assert a fork — and leans
# confidence low/medium with a needs-human framing.
vars:
  dimension: unanalyzable-fork-guard-no-signal
  artifact_kind: microskill draft bundle (MICROSKILL.md + profiles/base.yaml, concatenated)

context:
  snippets:
    - name: unanalyzable-fork-guard-no-signal-rubric
      text: >-
        Unanalyzable-fork-guard rubric for a microskill draft bundle — answer "is
        linearity genuinely undecidable here — an opaque step that could hide a branch
        but carries none of the floor's keywords?". The deterministic floor
        (validate-microskill) detects branches only by its fixed lexical keyword list
        (BRANCH_RE); a step that hides a branch without any of those keywords passes the
        floor silently — do not re-raise a keyword the floor already catches. Flag only
        no-signal cases, and flag the UNCERTAINTY rather than asserting a fork exists: an
        opaque or vague step whose phrasing could conceal a branch or loop but offers no
        keyword and no clear single path to confirm either way; a step deferring its real
        behavior to an unstated runtime decision the text does not resolve; a passage
        where the single-linear-path contract can be neither confirmed nor refuted from
        the words on the page. Absence of branch keywords is not proof of a single path —
        when you cannot decide, say so and request a human read; never manufacture a
        branch the text does not support. Severity mapping: an undecidable step that
        plausibly hides control flow = major, framed as needs-human (a person must
        confirm whether a fork exists, confidence low or medium); a mildly opaque step
        that probably resolves to one path = minor; a slightly terse but readable step =
        nit. Lean confidence low or medium across this lens — it reports the LIMITS of
        static analysis, not a proven defect. Set each finding's file to the real source
        file the issue lives in per the bundle's provenance markers (MICROSKILL.md) and
        line to that file's real line number — the downstream refute pass and fix step
        read the real source at the finding's file. Do not raise
        ms-single-linear-path-semantic (a fork you CAN confirm from the text) or
        ms-step-atomicity-linearity (per-step action bundling) concerns under this rubric
        — sibling lenses own them.
