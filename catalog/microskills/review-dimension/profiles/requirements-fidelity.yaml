version: 1

# requirements-fidelity lens overlay for review-dimension (minted by the technical-design
# stage, MULTIAGENTIC-DESIGN §3.2 / stage-technical-design §5). Overrides the active
# dimension, the artifact kind, and the rubric snippet — a plain list REPLACES base's
# correctness snippet wholesale (resolver list-replace rule). output_schema, inputs,
# runtime, and the body inherit from base. The caller threads the requirements document
# as context_path (the grounding doc, Read by path).
vars:
  dimension: requirements-fidelity
  artifact_kind: high-level design document (markdown)

context:
  snippets:
    - name: requirements-fidelity-rubric
      text: >-
        Requirements-fidelity rubric for a high-level design document. Read the
        requirements document from context_path as ground truth; an absent context_path
        = a missing grounding basis: raise exactly one blocker finding naming the missing
        requirements grounding, and review nothing blind. Flag only fidelity defects: a
        functional requirement with no owning component, flow, or design element that
        realizes it; a design decision that contradicts a stated requirement or a stated
        constraint from Constraints & Assumptions; components, services, or capabilities
        serving no stated requirement (invented scope); a requirement reinterpreted —
        the design solves a materially different problem than the requirement states;
        items the requirements place out of scope that the design nonetheless builds.
        Severity mapping: a contradicted requirement or violated stated constraint =
        blocker; a substantial requirement with no owning design element, or substantial
        invented scope = major; a reinterpretation nuance or an unowned peripheral
        requirement = minor. Set each finding's file to the reviewed design document's
        path and line to the line number of the cited section anchor — the downstream
        refute pass reads the artifact at the finding's file. Do not raise
        internal-consistency, NFR-coverage, feasibility, or security concerns under this
        rubric — sibling lenses own them.
