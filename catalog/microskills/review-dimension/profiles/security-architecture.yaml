version: 1

# security-architecture lens overlay for review-dimension (minted by the technical-design
# stage, MULTIAGENTIC-DESIGN §3.2 / stage-technical-design §5). Overrides the active
# dimension, the artifact kind, and the rubric snippet — a plain list REPLACES base's
# correctness snippet wholesale (resolver list-replace rule). Distinct from the code-level
# `security` profile: this lens reviews DESIGN-level security posture, not diff hunks.
# output_schema, inputs, runtime, and the body inherit from base. The caller threads the
# requirements document as context_path (the grounding doc, Read by path).
vars:
  dimension: security-architecture
  artifact_kind: high-level design document (markdown)

context:
  snippets:
    - name: security-architecture-rubric
      text: >-
        Security-architecture rubric for a high-level design document — design-level
        weaknesses only (the code-level security dimension owns implementation flaws).
        Read the requirements document from context_path for the stated security,
        privacy, and compliance requirements. Flag only architectural security defects:
        no authentication or authorization architecture where the design exposes user-
        or system-facing entry points; undefined trust boundaries — external input
        crosses into internal components with no named validation or sanitization
        boundary; sensitive data flows (credentials, personal data, payment data) with
        no stated protection in transit or at rest; absent secrets management for
        credentials, keys, or tokens the design requires; multi-tenant or multi-user
        data with no stated isolation model; no audit or security-logging placement
        where the requirements demand accountability; a stated compliance requirement
        (retention, erasure, residency) with no design answer; a security-relevant
        third-party dependency adopted with no trust rationale. Severity mapping: a
        missing authn/authz architecture or an unprotected sensitive data flow =
        blocker; an undefined trust boundary, or an absent secrets-management,
        isolation, or audit answer = major; a thin trust rationale on a peripheral
        dependency = minor. Set each finding's file to the reviewed design document's
        path and line to the line number of the cited section anchor — the downstream
        refute pass reads the artifact at the finding's file. Do not raise
        internal-consistency, requirements-fidelity, NFR-coverage, or feasibility
        concerns under this rubric — sibling lenses own them.
