version: 1

# The active quality dimension. Substituted as {{dimension}} throughout the
# MICROSKILL.md body (steps + output), so the dimension flows into the rendered
# prose, the output `dimension` field, and the dimension-prefixed finding id.
# Default = correctness; a per-dimension profile overlay (security / performance
# / style) overrides this for each fan-out branch.
#
# `artifact_kind` names WHAT is being reviewed. Substituted as {{artifact_kind}}
# in the inputs table, the read/scan steps, and the not-parseable failure mode.
# Base = the code-review diff; a document-review profile (e.g. req-nfr,
# internal-consistency) overrides it to the document kind it reviews.
vars:
  dimension: correctness
  artifact_kind: unified git diff

# `artifact_path` is Required=yes in the MICROSKILL.md table, so the resolver
# needs inputs.artifact_path.required: true to gather it at runtime; it is passed
# by reference (`materialize: file`; the body Reads it). `context_path` is
# optional grounding material, also by reference (null = no grounding).
# `change_summary` is optional with a null default, so it needs no entry. No
# input declares a non-null default.
inputs:
  artifact_path:
    required: true
    materialize: file
  context_path:
    materialize: file

# The body Reads the artifact file at artifact_path, so Read must be allowlisted.
# A per-dimension overlay (security/style) adds runtime.model — it deep-merges
# with this allowed_tools, so both survive.
runtime:
  allowed_tools: [Read]

# The active dimension's rubric, supplied as reference context so the body has a
# concrete rubric to scan against. Base ships the correctness rubric to match
# the default dimension; without it the default run would halt at the body's own
# "Missing rubric context" failure mode. A per-dimension profile overlay
# replaces this snippet with that dimension's rubric.
context:
  snippets:
    - name: correctness-rubric
      text: >-
        Correctness rubric (default dimension): flag only defects that make the
        code produce wrong results or behave incorrectly — logic and algorithm
        errors; off-by-one and boundary mistakes; null / undefined /
        uninitialized handling; missing or incorrect error and exception
        handling; unhandled edge cases and invalid inputs; race conditions and
        concurrency hazards; incorrect API, library, or type-contract usage;
        broken invariants, state corruption, and resource leaks; control-flow
        mistakes such as wrong conditionals or missing returns / breaks. Do not
        raise style, performance, or security-only concerns under this rubric.

output_schema:
  type: object
  required: [dimension, findings]
  properties:
    dimension: { type: string }
    findings:
      type: array
      items:
        type: object
        required: [id, severity, file, title, explanation, confidence]
        properties:
          id: { type: string }
          severity: { type: string, enum: [blocker, major, minor, nit] }
          file: { type: string }
          line: { type: integer }
          title: { type: string }
          explanation: { type: string }
          fix: { type: string }
          confidence: { type: string, enum: [high, medium, low] }
