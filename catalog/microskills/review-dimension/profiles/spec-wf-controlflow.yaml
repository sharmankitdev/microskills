version: 1

# spec-wf-controlflow lens overlay for review-dimension (create pipeline, §8 step 6 / D3).
# Reviews a workflow specification document for correct, complete control-flow
# specification. Sibling of the req-* lenses — no floor runs at this stage. A plain list
# REPLACES base's snippet wholesale. output_schema, inputs, runtime, body inherit from base.
vars:
  dimension: spec-wf-controlflow
  artifact_kind: workflow specification document

context:
  snippets:
    - name: spec-wf-controlflow-rubric
      text: >-
        Control-flow rubric for a workflow specification document — answer "is every
        gate, loop, conditional, and fan-out specified completely enough to build, and
        does it terminate?" against Control Flow and Node Inventory. The workflow layer
        owns all control flow (gates, loops, when, for_each); a microskill has none.
        Flag only control-flow defects: a loop with no stated convergence/exit condition
        or no iteration bound (non-termination); a human-approval gate with no stated
        options or no stated consequence per option; a when/for_each guard whose source
        field is unstated or unresolvable from the inventory; a fan-out (for_each) with
        no matching fan-in/collection stage; a bounded loop with no stated
        on-exhaust/escalation behavior; a step requiring human interaction (a gate /
        AskUserQuestion) placed where the spec says it must run unattended/in-background
        (it would silently fabricate). Severity mapping: a loop with no convergence bound,
        or an interaction placed in an unattended segment = blocker; an unguarded gate, a
        fan-out with no fan-in, or a guard with no resolvable source = major; an
        underspecified-but-recoverable guard or option set = minor; a cosmetic control-flow
        wording issue = nit. Open-question parity rule (binding): an explicit
        open-question, TBD, or unresolved-decision line inside Control Flow or Node
        Inventory that gates termination or a gate/guard = blocker, any other such line in
        those sections = major; lines inside the structural Open Questions / Gaps section
        are the spec's own gap ledger, never findings. Set each finding's file to the
        reviewed document's path and line to the line number of the cited section heading.
        Do not raise spec-wf-coverage (goal→node coverage and Constraints & NFRs
        completeness) or spec-wf-dataflow (producer→consumer wiring) concerns under this
        rubric — sibling lenses own them.
