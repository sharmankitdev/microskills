version: 1

# ms-step-atomicity-linearity lens overlay for review-dimension (create pipeline, §8
# step 4). Overrides the active dimension, the artifact kind, and the rubric snippet —
# a plain list REPLACES base's correctness snippet wholesale (resolver list-replace
# rule). output_schema, inputs, runtime, and the body inherit from base.
vars:
  dimension: ms-step-atomicity-linearity
  artifact_kind: microskill draft bundle (MICROSKILL.md + profiles/base.yaml, concatenated)

context:
  snippets:
    - name: ms-step-atomicity-linearity-rubric
      text: >-
        Step-atomicity rubric for a microskill draft bundle — answer "is each numbered
        step exactly one action on a single straight path?". The deterministic floor
        (validate-microskill) already blocks the lexical branching keywords in Steps
        (if/else/for each/repeat/retry/when…then/based on/depending on/either/go to
        step/otherwise/or if/unless), zero numbered steps, and warns past ten steps —
        do not re-raise those, and treat verb-led phrasing as advisory only (never a
        finding). Flag only step-atomicity defects the floor's keyword scan misses: a
        single numbered step that bundles two or more distinct actions ("validate and
        write and notify"); a step that hides a conditional or iteration in prose
        without a keyword ("process the matching ones"); a step whose action depends on
        a runtime decision the step does not make explicit; a step that silently
        encodes ordering or fan-out the linear contract forbids. Severity mapping: a
        step concealing a branch or loop = blocker (the linearity contract is violated);
        a step bundling separable actions that should be two steps = major; a wordy but
        single-action step = minor. Set each finding's file to the real source file the
        issue lives in per the bundle's provenance markers (MICROSKILL.md) and line to
        that file's real line number — the downstream refute pass and fix step read the
        real source at the finding's file. Do not raise ms-atomicity-single-purpose
        (whole-skill single purpose), ms-single-linear-path-semantic (the overall flow
        shape, conditional Output, and macro-flow forks across steps), or
        unanalyzable-fork-guard-no-signal (undecidable cases) concerns under this rubric —
        sibling lenses own them.
