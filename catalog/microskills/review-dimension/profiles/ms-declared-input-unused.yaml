version: 1

# ms-declared-input-unused lens overlay for review-dimension (create pipeline, §8 step
# 4). Overrides the active dimension, the artifact kind, and the rubric snippet — a
# plain list REPLACES base's correctness snippet wholesale (resolver list-replace rule).
# output_schema, inputs, runtime, and the body inherit from base.
vars:
  dimension: ms-declared-input-unused
  artifact_kind: microskill draft bundle (MICROSKILL.md + profiles/base.yaml, concatenated)

context:
  snippets:
    - name: ms-declared-input-unused-rubric
      text: >-
        Declared-input-unused rubric for a microskill draft bundle — answer "is every
        declared input actually consumed by some step?". The deterministic floor
        (validate-microskill) validates the Inputs table's shape and the required-input
        fidelity match but never flags an input that no step uses — do not re-raise
        table-shape or fidelity issues. Flag only dead-input defects (the other half of
        input/step coherence): a declared input that no step references, reads, or
        otherwise consumes; an input kept from an earlier draft that the current Steps no
        longer touch; an input the Output mentions but no Step actually uses to produce
        it; a Required=yes input that, despite being mandatory to gather, drives no step.
        Severity mapping: a Required=yes input that no step uses (the caller is forced to
        supply data the skill ignores) = major, rising to blocker only if that ignored
        input means a required capability silently never runs; an optional input no step
        uses = minor (dead surface needing a decision to keep or drop); a vestigial input
        mentioned only in passing = nit. Set each finding's file to the real source file
        the issue lives in per the bundle's provenance markers (MICROSKILL.md or
        profiles/base.yaml) and line to that file's real line number — the downstream
        refute pass and fix step read the real source at the finding's file. Do not raise
        ms-step-input-reference-undeclared (a step naming data no input declares) or
        ms-inputs-contract-adequacy (whether the input SET is complete against the
        requirement) concerns under this rubric — sibling lenses own them.
