version: 1

# lld-feasibility lens overlay for review-dimension (minted by the technical-design
# stage, MULTIAGENTIC-DESIGN §3.2 / stage-technical-design §5). Overrides the active
# dimension, the artifact kind, and the rubric snippet — a plain list REPLACES base's
# correctness snippet wholesale (resolver list-replace rule). output_schema, inputs,
# runtime, and the body inherit from base. The caller threads the HLD as context_path —
# the LLD's contract source, Read by path.
vars:
  dimension: lld-feasibility
  artifact_kind: low-level design document (markdown)

context:
  snippets:
    - name: lld-feasibility-rubric
      text: >-
        LLD-feasibility rubric for a low-level design document — judge implementability
        of the ONE component this LLD details, grounded by the high-level design Read
        from context_path. Flag only feasibility defects: a specified algorithm or data
        structure that cannot satisfy its own stated constraints (complexity, ordering,
        atomicity, uniqueness) as written; an API specification unimplementable as
        stated — contradictory parameters, impossible return guarantees, or concurrency
        semantics too ambiguous to implement one way; a named library, framework
        feature, or platform capability that does not exist or does not provide what
        the LLD assigns it; a hand-waved hard part — the genuinely difficult step
        described only as "somehow", "handled appropriately", or a bare placeholder; a
        resource or performance assumption implausible against the HLD's stated targets
        (e.g. a quadratic pass over data the HLD sizes in the millions); a specified
        sequence that deadlocks or races as written. Severity mapping: an
        unimplementable specification or nonexistent capability on the component's main
        path = blocker; a hand-waved hard part or an implausible resource assumption =
        major; an ambiguous semantic on a peripheral operation = minor. Set each
        finding's file to the reviewed LLD document's path and line to the line number
        of the cited section anchor — the downstream refute pass reads the artifact at
        the finding's file. Do not raise HLD-fidelity or completeness concerns under
        this rubric — sibling lenses own them.
