version: 1

# ms-step-input-reference-undeclared lens overlay for review-dimension (create pipeline,
# §8 step 4). Overrides the active dimension, the artifact kind, and the rubric snippet
# — a plain list REPLACES base's correctness snippet wholesale (resolver list-replace
# rule). output_schema, inputs, runtime, and the body inherit from base.
vars:
  dimension: ms-step-input-reference-undeclared
  artifact_kind: microskill draft bundle (MICROSKILL.md + profiles/base.yaml, concatenated)

context:
  snippets:
    - name: ms-step-input-reference-undeclared-rubric
      text: >-
        Step-references-undeclared-input rubric for a microskill draft bundle — answer
        "does every datum a step consumes trace back to a declared input?". The
        deterministic floor (validate-microskill) warns only when a base or overlay
        input is absent from the Inputs table; it never checks whether a STEP references
        data that no input declares — do not re-raise the table-coverage warning. Flag
        only undeclared-reference defects (one half of input/step coherence): a step that
        names or consumes a value with no matching declared input; a step whose core
        action needs data the skill never receives as an input; a step referencing a
        field of an input that the input's declared type does not contain; a step that
        assumes a default or ambient value the bundle never declares. Severity mapping: a
        step's core action that needs data with no input to supply it (the step cannot
        run) = blocker; a step referencing an undeclared value on a non-critical path =
        major; a loosely-worded step that probably means a declared input but names it
        imprecisely = minor. Set each finding's file to the real source file the issue
        lives in per the bundle's provenance markers (MICROSKILL.md or profiles/base.yaml)
        and line to that file's real line number — the downstream refute pass and fix
        step read the real source at the finding's file. Do not raise
        ms-declared-input-unused (an input no step uses) or ms-inputs-contract-adequacy
        (whether the input SET is complete against the requirement) concerns under this
        rubric — sibling lenses own them.
