version: 1

# spec-wf-coverage lens overlay for review-dimension (create pipeline, §8 step 6 / D3).
# Reviews a workflow specification document for goal→node coverage AND Constraints & NFRs
# completeness — it owns template section 6 so the three spec-wf lenses partition all eight
# sections with none unreviewed (the gap-ledger section 7 is fenced out of every lens).
# Sibling of the req-* lenses — no floor runs at this stage. A plain list REPLACES base's
# snippet wholesale. output_schema, inputs, runtime, and the body inherit from base.
vars:
  dimension: spec-wf-coverage
  artifact_kind: workflow specification document

context:
  snippets:
    - name: spec-wf-coverage-rubric
      text: >-
        Coverage rubric for a workflow specification document — answer "does the node
        inventory realize the whole stated goal, and does the spec state the constraints
        and non-functional requirements that goal demands?" against Goal, Node Inventory,
        Constraints & NFRs, and Out of Scope. Flag only coverage gaps:
        a goal capability or stated outcome that no node in the inventory realizes; a
        plainly-required stage absent from the inventory (an artifact is consumed
        downstream but nothing produces it; a result is published but never assembled);
        a node whose purpose exceeds the goal without being justified (scope creep); work
        the Goal promises but the spec silently relegates to Out of Scope without
        rationale; a stage named in the Goal narrative with no corresponding node; a
        constraint or non-functional requirement the stated goal or scope plainly demands
        (determinism or reproducibility, a cost or latency budget, a concurrency or
        parallelism bound, an unattended or segment-execution constraint, a regression or
        compatibility target) that the Constraints & NFRs section omits entirely; a
        non-functional requirement stated there without a quantified target, bound, or
        verifiable condition; a stated constraint that contradicts the Goal or the node
        inventory. Severity mapping: a goal capability with no node realizing it (the
        workflow cannot meet its stated goal) = blocker; an ambiguous coverage gap a
        reviewer must resolve, or a goal-demanded constraint or NFR category absent
        entirely = major; a redundant or peripheral node, a thin Out-of-Scope
        justification, or a present-but-unquantified NFR = minor; a cosmetic inventory
        wording issue = nit. Open-question parity rule (binding): an explicit
        open-question, TBD, or unresolved-decision line inside Goal, Node Inventory,
        Constraints & NFRs, or Out of Scope that gates whether the goal is covered or a
        demanded constraint is met = blocker, any other such line in those sections =
        major; lines inside the structural Open Questions / Gaps section are the spec's
        own gap ledger, never findings. Set each finding's file to the reviewed document's
        path and line to the line number of the cited section heading. Do not raise
        spec-wf-controlflow (gate / loop / guard specification) or spec-wf-dataflow
        (producer→consumer wiring) concerns under this rubric — sibling lenses own them.
