version: 1

# spec-ms-completeness lens overlay for review-dimension (create pipeline, §8 step 6 /
# D3). The refine-requirements critique panel fans over this lens when assembling a
# microskill specification. It reviews the SPEC document (no programmatic floor runs at
# this stage — validate-microskill runs later, at the create-pipeline implement stage),
# so this rubric is a sibling of the req-* completeness lenses, NOT the draft-review
# ms-* lenses. A plain list REPLACES base's correctness snippet wholesale (resolver
# list-replace rule). output_schema, inputs, runtime, and the body inherit from base.
vars:
  dimension: spec-ms-completeness
  artifact_kind: microskill specification document

context:
  snippets:
    - name: spec-ms-completeness-rubric
      text: >-
        Completeness rubric for a microskill specification document — answer "which
        microskill-contract sections are absent, empty, or too thin to build from?"
        against the spec's seven sections (Capability & Single Responsibility · Inputs
        Contract · Output Schema · Linear Steps ≤10 · Failure Modes · Atomicity Boundary
        & Non-Goals · Open Questions / Gaps). Flag only completeness gaps: a contract
        section absent or present-but-empty; an Inputs Contract that names an input
        without its requiredness (yes/no) or its source/type; an Output Schema that
        asserts a result without naming the fields a consumer will read; Linear Steps
        that are placeholders or stop short of producing the stated output; Failure
        Modes that omit a failure plainly reachable from a stated input or step (a
        missing file, an empty source, an unparseable artifact); an Atomicity Boundary
        & Non-Goals section that never states what the skill deliberately excludes; a
        Capability statement that names no concrete produced artifact. Severity mapping:
        a core contract section (Inputs Contract, Output Schema, or Linear Steps) absent
        or empty = blocker; a present-but-thin contract element a builder could not
        implement without guessing = major; a peripheral omission worth recording =
        minor; a cosmetic thinness on an otherwise-complete section = nit. Open-question
        parity rule (binding): an explicit open-question, TBD, or unresolved-decision
        line inside a core contract-bearing section (Capability & Single Responsibility,
        Inputs Contract, Output Schema, Linear Steps, Failure Modes, Atomicity Boundary
        & Non-Goals) is itself a finding — a question gating a buildable contract =
        blocker, any other such line = major; lines inside the structural Open Questions
        / Gaps section are the spec's own gap ledger, never findings. Set each finding's
        file to the reviewed document's path and line to the line number of the cited
        section heading. Do not raise spec-ms-atomicity (single-responsibility /
        single-linear-path / step-count) concerns under this rubric — that sibling lens
        owns them.
