# Harness manifest (v2) — the components this project uses.
# Two lists, each entry tagged by source:
#   source: plugin  → materialized from the plugin catalog by `initialize-harness`
#                     (referenced, never copied into harness/). `harness-sync` never touches these.
#   source: custom  → authored here under harness/<kind-dir>/<name>/ and reconciled by `harness-sync`.
# Schema: templates/references/harness-schema.json
version: 2
microskills:
  - name: task-plan
    source: plugin
  - name: task-implement
    source: plugin
  - name: task-evaluate
    source: plugin
  - name: validate-microskill
    source: plugin
  - name: analyze-monolith-orchestrator
    source: plugin
  # domain: software-engineering (code-review) — atomic microskills composed by the
  # review-changes workflow. Forward-compat breadcrumb for a future tag/domain system
  # (schemas are closed grammars today, so this grouping rides in a comment).
  - name: summarize-diff
    source: plugin
  - name: verify-finding
    source: plugin
  - name: synthesize-review
    source: plugin
  - name: collect-findings
    source: plugin
  - name: review-dimension
    source: plugin
  # domain: software-engineering (requirements) — atomic assimilation microskill composed by
  # the refine-requirements workflow.
  - name: assimilate-requirements
    source: plugin
  # domain: product-development — atomic microskills for the develop-product-backlog
  # pipeline (MULTIAGENTIC-DESIGN.md), provisioned via microskill-create.
  - name: classify-product
    source: custom
    profiles: [base]
  - name: judge-artifacts
    source: custom
    profiles: [base, cognitive-load, evolvability, flow-efficiency, journey-fit, requirements-fit, simplicity]
  - name: synthesize-panel
    source: custom
    profiles: [base, design, ux]
  - name: extract-closure-claims
    source: custom
    profiles: [base]
  - name: generate-backlog
    source: custom
    profiles: [base]
  - name: verify-traceability
    source: custom
    profiles: [base]
  - name: refute-story-quality
    source: custom
    profiles: [base]
  - name: collect-artifacts
    source: custom
    profiles: [base, hld-candidates, ux-candidates]
  - name: author-design-artifact
    source: custom
    profiles: [base, hld, hld-candidate, lld, lld-fix, ux-journeys, wireframe-candidate, wireframe-revise]
  - name: tally-votes
    source: custom
    profiles: [base]
  - name: apply-findings-to-document
    source: custom
    profiles: [base]
  - name: publish-backlog
    source: custom
    profiles: [base, github]
  - name: assemble-evidence
    source: custom
    profiles: [base, design, requirements, ux-stage]
  - name: expand-assignments
    source: custom
    profiles: [base]
workflows:
  - name: microskill-create
    source: plugin
  - name: workflow-create
    source: plugin
  - name: build-workflow-from-plan
    source: plugin
  - name: decompose-monolith-orchestrator
    source: plugin
  # domain: software-engineering (code-review) — flagship pipeline over the review microskills.
  - name: review-changes
    source: plugin
  # domain: software-engineering (requirements) — wraps assimilate-requirements with a
  # when-split, bounded gap-refinement loop driven by AskUserQuestion.
  - name: refine-requirements
    source: plugin
  # domain: product-development — develop-product-backlog pipeline (MULTIAGENTIC-DESIGN.md).
  - name: ux-design
    source: custom
    profiles: [base, autonomous]
  - name: technical-design
    source: custom
    profiles: [base, autonomous]
  - name: backlog-publication
    source: custom
    profiles: [base, autonomous, github, github-autonomous]
  - name: develop-product-backlog
    source: custom
    profiles: [base, autonomous, github, github-autonomous]
