# Harness manifest (v2) — the components this project uses.
# Two lists, each entry tagged by source:
#   source: plugin  → materialized from the plugin catalog by `initialize-harness`
#                     (referenced, never copied into harness/). `harness-sync` never touches these.
#   source: custom  → authored here under harness/<kind-dir>/<name>/ and reconciled by `harness-sync`.
# Schema: templates/references/harness-schema.json
version: 2
microskills:
  - name: task-plan
    source: plugin
  - name: task-implement
    source: plugin
  - name: task-evaluate
    source: plugin
  - name: validate-microskill
    source: plugin
  - name: analyze-monolith-orchestrator
    source: plugin
  # domain: software-engineering (code-review) — atomic microskills composed by the
  # review-changes workflow. Forward-compat breadcrumb for a future tag/domain system
  # (schemas are closed grammars today, so this grouping rides in a comment).
  - name: summarize-diff
    source: plugin
  - name: verify-finding
    source: plugin
  - name: synthesize-review
    source: plugin
  - name: collect-findings
    source: plugin
  - name: review-dimension
    source: plugin
  # domain: software-engineering (requirements) — atomic assimilation microskill composed by
  # the refine-requirements workflow.
  - name: assimilate-requirements
    source: plugin
workflows:
  - name: microskill-create
    source: plugin
  - name: workflow-create
    source: plugin
  - name: build-workflow-from-plan
    source: plugin
  - name: decompose-monolith-orchestrator
    source: plugin
  # domain: software-engineering (code-review) — flagship pipeline over the review microskills.
  - name: review-changes
    source: plugin
  # domain: software-engineering (requirements) — wraps assimilate-requirements with a
  # when-split, bounded gap-refinement loop driven by AskUserQuestion.
  - name: refine-requirements
    source: plugin
