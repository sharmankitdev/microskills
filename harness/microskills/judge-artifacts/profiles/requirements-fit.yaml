version: 1

# requirements-fit lens overlay for judge-artifacts (minted per MULTIAGENTIC-DESIGN §3.2).
# Swaps ONLY vars.judge_lens — inputs, runtime, output_schema, and the body
# inherit from base: the SAME body scores candidates under this lens.
vars:
  judge_lens: >-
    how completely and faithfully the candidate design satisfies the
    grounding requirements document — every functional requirement maps to a
    component or interaction that realizes it; the stated NFRs are addressed
    by name with a concrete mechanism; constraints and out-of-scope lines are
    respected; nothing material is silently dropped or contradicted. Score
    high for full, traceable requirement coverage; score low for unaddressed
    requirements, hand-waved NFRs, or contradictions of stated constraints.
