version: 1

# The active judging lens. Substituted as {{judge_lens}} throughout the
# MICROSKILL.md body (description, scoring step, output), so the concrete lens
# text flows into the rendered prose and the output `lens` field. Default =
# overall fitness-for-purpose against the grounding requirements; a per-lens
# profile overlay overrides this for a sharper rubric (mirrors review-dimension's
# vars.dimension: correctness).
vars:
  judge_lens: >-
    overall fitness-for-purpose of the candidate against the grounding
    requirements

# requirements_path is the authoritative grounding file and context_path is
# optional supplementary grounding; both are passed by reference (materialize:
# file; the body Reads them). candidates and requirements_path are Required=yes
# in the MICROSKILL.md table, so the resolver needs the required flags to gather
# them at runtime. No input declares a non-null default.
inputs:
  candidates:
    required: true
  requirements_path:
    required: true
    materialize: file
  context_path:
    materialize: file

# The body Reads the requirements file, the optional context file, and each
# candidate's document_path, so Read must be allowlisted.
runtime:
  allowed_tools: [Read]

output_schema:
  type: object
  required: [lens, scores, ranking, rationale]
  properties:
    lens:
      type: string
      description: Echoes the active judge_lens name.
    scores:
      type: array
      items:
        type: object
        required: [label, document_path, score, strengths, weaknesses]
        properties:
          label: { type: string }
          document_path: { type: string }
          score: { type: number }
          strengths: { type: array, items: { type: string } }
          weaknesses: { type: array, items: { type: string } }
    ranking:
      type: array
      items: { type: string }
      description: Candidate labels, best first.
    rationale:
      type: string
      description: Short paragraph justifying the ranking.
