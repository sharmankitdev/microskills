version: 1

# ux-journeys overlay for author-design-artifact (ux-design stage, §3.2).
# Swaps only the design-contract var — the body, inputs, and runtime are
# inherited from base — and REPLACES output_schema wholesale (resolver replace
# rule) so the journeys node returns the screen inventory the downstream
# wireframe candidates and the journey-coverage critic chain on.
vars:
  design_contract: >-
    ux-journeys contract: author the personas + user-journeys document at
    <output_dir>/ux/journeys.md from the requirements document at primary_path.
    Required sections: (1) Personas — distill 2 to 4 personas from the stated
    user types and goals, one subsection per persona carrying name, goal, and
    usage context; (2) User journeys — one journey per primary
    requirement-driven task, each carrying name, the persona it serves, the
    trigger, the ordered steps, and the success condition, and citing the
    requirement section(s) it realizes; (3) Screen inventory — enumerate the
    screens the journeys imply, one entry per screen carrying the screen name
    and journey_refs (the names of every journey passing through it). Coverage
    is structural: every journey appears in at least one screen's journey_refs,
    and every screen serves at least one journey. A non-null classification
    object grounds the product framing (product_kind, has_ui); a null
    classification = infer the framing from the requirements document. The
    screen inventory is also the returned screens array, entries verbatim.

# REPLACES base {document_path, summary} wholesale: the screens array is the
# load-bearing handle — wireframe candidates sketch one section per entry and
# the ux-journey-coverage rubric blocks on any journey without a screen path.
output_schema:
  type: object
  required: [document_path, screens, summary]
  properties:
    document_path: { type: string }
    screens:
      type: array
      minItems: 1
      items:
        type: object
        required: [name, journey_refs]
        properties:
          name: { type: string }
          journey_refs:
            type: array
            items: { type: string }
    summary: { type: string }
