version: 1

# `invest_rubric` is the built-in contract variable the body's Step 2 reads to
# select the criterion's section. Base ships the six INVEST criteria, each with a
# violation rubric, so at runtime the body has concrete rubric data to read and
# the "criterion not a rubric-defined name" failure mode is enforceable (the
# value must name one of these sections). Implements the `vars` axis. A profile
# overlay may replace this var wholesale to test a different criteria set.
vars:
  invest_rubric: >-
    INVEST rubric — each criterion names a section; the criterion input must
    match one of these names. Independent: a story stands alone and can be
    built and shipped without depending on another unfinished story or a hidden
    ordering — violated when it cannot be started or delivered until some other
    story lands first, or when two stories must move together. Negotiable: the
    story states the need and intent, not a frozen contract of implementation
    detail — violated when it over-specifies the solution, prescribes the exact
    UI/schema/algorithm, and leaves no room to discuss the how. Valuable:
    delivering the story yields observable value to a user or the business —
    violated when it describes internal plumbing, a technical task, or a refactor
    with no user- or business-visible outcome. Estimable: the team can size the
    story with the information present — violated when scope is unknowable,
    acceptance is undefined, or unresolved unknowns make any estimate a guess.
    Small: the story fits within a single iteration and a few days of work —
    violated when it is epic-sized, bundles several independent capabilities, or
    its acceptance criteria sprawl across many distinct outcomes. Testable: the
    story carries clear, verifiable acceptance criteria — violated when success
    is subjective ("fast", "intuitive"), criteria are absent, or no concrete pass
    condition can be written.

# The body Reads the story file at story.path (Step 1), so Read must be
# allowlisted — pins the skill to exactly the tool the plan's "Tools: [Read]"
# requirement names. Implements the `runtime` axis.
runtime:
  allowed_tools: [Read]

# `inputs` axis: story and criterion are Required=yes in the MICROSKILL.md table,
# so the resolver needs these required overrides to gather them at runtime. seat
# is optional (null default) and needs no entry. No input declares a non-null
# default, so no `default:` lines are emitted.
inputs:
  story:
    required: true
  criterion:
    required: true

output_schema:
  type: object
  required: [story_id, criterion, seat, refuted, severity, rationale, confidence, needs_human]
  properties:
    story_id: { type: string }
    criterion: { type: string }
    seat: { type: [integer, "null"] }
    refuted: { type: boolean }
    severity: { type: [string, "null"], enum: [blocker, major, minor, null] }
    rationale: { type: string }
    confidence: { type: string, enum: [high, medium, low] }
    needs_human: { type: boolean }
